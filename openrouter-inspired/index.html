    function renderModelsGrid(keyword = "") {
      const el = document.getElementById("models-grid");
      if (!el) return;
      updateAppState("models", { search: keyword });
      renderDirectoryStatus("models-status", "models");
      const lower = keyword.trim().toLowerCase();
      const filtered = appServices.catalog.listModels().filter(m => `${m.name} ${m.provider} ${m.tag}`.toLowerCase().includes(lower));
      const selectedModelSlug = getAppState("models").selectedSlug;
      el.innerHTML = filtered.map(m => `
        <div class="card panel">
          <div style="display:flex;justify-content:space-between;gap:16px;align-items:flex-start">
            <div><div class="title">${m.name}</div><div class="small muted" style="margin-top:4px">by ${m.provider}</div></div>
            <span class="chip">${m.tag}</span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:20px">
            <div class="mini-card"><div class="small muted">Latency</div><div class="kpi" style="margin-top:4px">${m.latency}</div></div>
            <div class="mini-card"><div class="small muted">Price</div><div class="kpi" style="margin-top:4px">${m.price}</div></div>
          </div>
          <button class="inline-link" data-model-slug="${m.slug}" style="margin-top:20px">${m.slug === selectedModelSlug ? "Viewing details" : "View details"} <span>→</span></button>
        </div>
      `).join("");
    }

    async function syncCatalogDirectoryState(options = {}) {
      const result = await appServices.catalog.ensureModelsLoaded(options);
      if (getCurrentPage() === "Home") renderFeaturedModelsGrid();
      if (getCurrentPage() === "Models") {
        renderModelsGrid(getCurrentModelSearch());
        renderModelDetailState();
      }
      return result;
    }

    async function syncSelectedModelDetail(slug, options = {}) {
      if (!slug) return null;
      const result = await appServices.catalog.ensureModelDetail(slug, options);
      if (getCurrentPage() === "Models") {
        renderModelsGrid(getCurrentModelSearch());
        renderModelDetailState();
      }
      return result;
    }

    function renderModelsPageState() {
      renderModelsGrid(getCurrentModelSearch());
      renderModelDetailState();
      const input = document.getElementById("model-search");
      if (input) {
        input.value = getCurrentModelSearch();
        if (!input.dataset.bound) {
          input.addEventListener("input", (event) => renderModelsGrid(event.target.value));
          input.dataset.bound = "true";
        }
      }
      void syncCatalogDirectoryState();
      if (getAppState("models").selectedSlug) void syncSelectedModelDetail(getAppState("models").selectedSlug);
      void appServices.onboarding.markOnboardingStep("review-catalog", {
        completedAt: new Date().toISOString(),
        sourceMode: "derived"
      });
    }

    function renderInteractivePageState() {
      const interactiveRenderers = {
        Home: renderHomePageState,
        Docs: renderDocsPageState,
        Chat: renderChatPageState,
        Fusion: renderFusionPageState,
        Models: renderModelsPageState,
        Account: renderAccountPageState
      };
      const renderer = interactiveRenderers[getCurrentPage()];
      if (renderer) renderer();
      void syncRecoveryState();
    }

    function getPageHash(nextPage) {
      return (ROUTES[nextPage] || ROUTES[DEFAULT_PAGE]).hash;
    }

    function getPageFromHash(hash = window.location.hash) {
      const routeKey = hash.replace(/^#\/?/, "").trim().toLowerCase();
      return ROUTE_TO_PAGE[routeKey] || DEFAULT_PAGE;
    }

    function updateHash(nextPage, { replace = false } = {}) {
      const nextHash = getPageHash(nextPage);
      if (window.location.hash === nextHash) return false;
      if (replace) {
        const nextUrl = `${window.location.pathname}${window.location.search}${nextHash}`;
        try {
          window.history.replaceState(null, "", nextUrl);
          return true;
        } catch (error) {
          // Fall back to standard hash updates if replaceState is unavailable.
        }
      }
      window.location.hash = nextHash;
      return true;
    }

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showPage(nextPage, { scroll = true } = {}) {
      closeActionPanel();
      if (getCurrentPage() === "Account" && nextPage !== "Account") {
        appServices.apiKeys.clearCreatedApiKey();
      }
      updateAppState("route", { page: nextPage, mobileOpen: false });
      renderApp();
      if (scroll) scrollToTop();
    }

    function goToPage(nextPage, { syncRoute = true, scroll = true } = {}) {
      if (!PAGES.includes(nextPage)) return;
      if (syncRoute && updateHash(nextPage)) return;
      showPage(nextPage, { scroll });
    }

    function syncPageWithHash({ scroll = false } = {}) {
      const nextPage = getPageFromHash();
      const routeState = getRouteState();
      if (routeState.page === nextPage && !routeState.mobileOpen) {
        if (scroll) scrollToTop();
        return;
      }
      showPage(nextPage, { scroll });
    }

    function handleDocumentClick(event) {
      const closeTarget = event.target.closest("[data-panel-close]");
      if (closeTarget) {
        event.preventDefault();
        appActions.closeActionPanel();
        return;
      }

      const signOutTarget = event.target.closest("[data-sign-out]");
      if (signOutTarget) {
        event.preventDefault();
        appActions.signOut();
        updateAppState("route", { mobileOpen: false });
        renderApp();
        return;
      }

      const recoveryOpenTarget = event.target.closest("[data-recovery-open]");
      if (recoveryOpenTarget) {
        event.preventDefault();
        appActions.openRecoveryCenter();
        return;
      }

      const recoveryActionTarget = event.target.closest("[data-recovery-action]");
      if (recoveryActionTarget) {
        event.preventDefault();
        appActions.continueRecovery(recoveryActionTarget.getAttribute("data-recovery-action"));
        return;
      }

      const recoveryDismissTarget = event.target.closest("[data-recovery-dismiss]");
      if (recoveryDismissTarget) {
        event.preventDefault();
        const result = appActions.dismissRecovery(recoveryDismissTarget.getAttribute("data-recovery-dismiss"));
        if (result && !result.ok) showActionFeedback(result, "Unable to hide this recovery item.");
        return;
      }

      const apiKeyCopyTarget = event.target.closest("[data-api-key-copy]");
      if (apiKeyCopyTarget) {
        event.preventDefault();
        void appActions.copyApiKeyValue(apiKeyCopyTarget.getAttribute("data-api-key-copy")).then((result) => {
          showActionFeedback(result, "API key copied.");
          if (getCurrentPage() === "Account") renderApp();
        });
        return;
      }

      const apiKeyHideTarget = event.target.closest("[data-api-key-hide]");
      if (apiKeyHideTarget) {
        event.preventDefault();
        appActions.clearCreatedApiKey();
        if (getCurrentPage() === "Account") renderApp();
        return;
      }

      const apiKeyRevokeTarget = event.target.closest("[data-api-key-revoke]");
      if (apiKeyRevokeTarget) {
        event.preventDefault();
        void appActions.revokeApiKey(apiKeyRevokeTarget.getAttribute("data-api-key-revoke")).then((result) => {
          showActionFeedback(result, "API key revoked.");
          if (getCurrentPage() === "Account") renderApp();
        });
        return;
      }

      const requestSettingsResetTarget = event.target.closest("[data-request-settings-reset]");
      if (requestSettingsResetTarget) {
        event.preventDefault();
        void appActions.resetRequestSettings().then((result) => {
          if (!result || !result.ok) showActionFeedback(result, "Unable to reset request settings.");
          if (getCurrentPage() === "Account") renderApp();
        });
        return;
      }

      const presetActivateTarget = event.target.closest("[data-preset-activate]");
      if (presetActivateTarget) {
        event.preventDefault();
        void appActions.activatePreset(presetActivateTarget.getAttribute("data-preset-activate")).then((result) => {
          if (!result || !result.ok) showActionFeedback(result, "Unable to activate preset.");
          if (getCurrentPage() === "Account") renderApp();
        });
        return;
      }

      const presetDeleteTarget = event.target.closest("[data-preset-delete]");
      if (presetDeleteTarget) {
        event.preventDefault();
        void appActions.deletePreset(presetDeleteTarget.getAttribute("data-preset-delete")).then((result) => {
          if (!result || !result.ok) showActionFeedback(result, "Unable to delete preset.");
          if (getCurrentPage() === "Account") renderApp();
        });
        return;
      }

      const onboardingContinueTarget = event.target.closest("[data-onboarding-continue]");
      if (onboardingContinueTarget) {
        event.preventDefault();
        void appActions.continueOnboarding();
        return;
      }

      const onboardingOpenTarget = event.target.closest("[data-onboarding-open]");
      if (onboardingOpenTarget) {
        event.preventDefault();
        void appActions.continueOnboarding(onboardingOpenTarget.getAttribute("data-onboarding-open"));
        return;
      }

      const onboardingDismissTarget = event.target.closest("[data-onboarding-dismiss]");
      if (onboardingDismissTarget) {
        event.preventDefault();
        void appActions.setOnboardingDismissed(true).then((result) => {
          if (!result || !result.ok) showActionFeedback(result, "Unable to hide quickstart.");
          if (getCurrentPage() === "Account" || getCurrentPage() === "Home") renderApp();
        });
        return;
      }

      const onboardingShowTarget = event.target.closest("[data-onboarding-show]");
      if (onboardingShowTarget) {
        event.preventDefault();
        void appActions.setOnboardingDismissed(false).then((result) => {
          if (!result || !result.ok) showActionFeedback(result, "Unable to restore quickstart.");
          if (getCurrentPage() === "Account" || getCurrentPage() === "Home") renderApp();
        });
        return;
      }

      const conversionContinueTarget = event.target.closest("[data-conversion-continue]");
      if (conversionContinueTarget) {
        event.preventDefault();
        appActions.continueConversion();
        return;
      }

      const conversionDismissTarget = event.target.closest("[data-conversion-dismiss]");
      if (conversionDismissTarget) {
        event.preventDefault();
        appActions.dismissConversion();
        if (getCurrentPage() === "Account") renderApp();
        return;
      }

      const actionTarget = event.target.closest("[data-action]");
      if (actionTarget) {
        event.preventDefault();
        if (!handlePublicConversionTarget(actionTarget)) {
          appActions.openActionPanel(actionTarget.getAttribute("data-action"), getActionContext(actionTarget));
        }
        return;
      }

      const docTarget = event.target.closest("[data-doc-slug]");
      if (docTarget) {
        event.preventDefault();
        appActions.selectDocArticle(docTarget.getAttribute("data-doc-slug"));
        return;
      }

      const fusionToggleTarget = event.target.closest("[data-fusion-model]");
      if (fusionToggleTarget) {
        event.preventDefault();
        appActions.toggleFusionModelSelection(fusionToggleTarget.getAttribute("data-fusion-model"));
        return;
      }

      const fusionRunTarget = event.target.closest("[data-fusion-run]");
      if (fusionRunTarget) {
        event.preventDefault();
        void appActions.runFusionSelection();
        return;
      }

      const modelTarget = event.target.closest("[data-model-slug]");
      if (modelTarget) {
        event.preventDefault();
        const slug = modelTarget.getAttribute("data-model-slug");
        const targetPage = modelTarget.getAttribute("data-go");
        if (targetPage) {
          updateAppState("models", { selectedSlug: slug });
          appActions.navigate(targetPage);
          return;
        }
        appActions.selectModel(slug);
        return;
      }

      const pageTarget = event.target.closest("[data-go]");
      if (!pageTarget) return;
      event.preventDefault();
      if (handlePublicConversionTarget(pageTarget)) {
        return;
      }
      if (pageTarget.getAttribute("data-go") === "Models" && !pageTarget.hasAttribute("data-model-slug")) {
        updateAppState("models", { selectedSlug: null });
      }
      appActions.navigate(pageTarget.getAttribute("data-go"));
    }

    async function handleDocumentSubmit(event) {
      const chatForm = event.target.closest("#chat-form");
      if (chatForm) {
        event.preventDefault();
        const chatInput = document.getElementById("chat-input");
        if (!chatInput) return;
        if (await appActions.submitChatMessage(chatInput.value)) {
          chatInput.value = "";
          chatInput.focus();
        }
        return;
      }

      const requestSettingsForm = event.target.closest("#request-settings-form");
      if (requestSettingsForm) {
        event.preventDefault();
        const result = await appActions.saveRequestSettings(collectRequestSettingsValues(requestSettingsForm));
        if (!result || !result.ok) showActionFeedback(result, "Unable to save request settings.");
        if (getCurrentPage() === "Account") renderApp();
        return;
      }

      const ctaForm = event.target.closest("#cta-form");
      if (!ctaForm) return;
      event.preventDefault();
      if (!ctaForm.reportValidity()) return;

      const actionKey = ctaForm.getAttribute("data-action-key");
      const schema = ACTION_FORM_SCHEMAS[actionKey];
      if (!schema) return;

      try {
        const values = collectFormValues(ctaForm, schema.fields);
        const result = await appActions.submitCtaForm(
          actionKey,
          values,
          getRouteState().activeAction ? getRouteState().activeAction.context : {}
        );

        if (!schema.inlineFeedback || !result || !result.ok) {
          showActionFeedback(result, schema.successMessage);
        }
        if (result && result.ok) {
          if ((actionKey === "sign-in" || actionKey === "sign-up") && result.postAuth && result.postAuth.destination) {
            appActions.closeActionPanel();
            followResolvedDestination(result.postAuth.destination);
            return;
          }
          if (["talk-to-sales", "request-demo"].includes(actionKey)) {
            appServices.conversion.clearIntent();
          }
          appActions.closeActionPanel();
          renderApp();
        }
      } catch (error) {
        showActionFeedback("Unable to save right now. Please try again.");
      }
    }

    function handleDocumentKeydown(event) {
      if (event.key === "Escape" && getRouteState().activeAction) appActions.closeActionPanel();
    }

    function getCurrentPageMarkup() {
      const page = getCurrentPage();
      if (page === "Models") return modelsPage();
      if (page === "Chat") return chatPage();
      if (page === "Rankings") return rankingsPage();
      if (page === "Apps") return appsPage();
      if (page === "Enterprise") return enterprisePage();
      if (page === "Pricing") return pricingPage();
      if (page === "Docs") return docsPage();
      if (page === "Fusion") return fusionPage();
      if (page === "Account") return accountPage();
      return homePage();
    }

    function renderApp() {
      const routeState = getRouteState();
      renderNav();
      mobileMenu.classList.toggle("show", routeState.mobileOpen);
      mobileToggle.textContent = routeState.mobileOpen ? "✕" : "☰";
      app.innerHTML = getCurrentPageMarkup();
      renderInteractivePageState();
      flushPendingRouteAction();
    }

    mobileToggle.addEventListener("click", () => {
      updateAppState("route", { mobileOpen: !getRouteState().mobileOpen });
      renderApp();
    });

    document.addEventListener("click", handleDocumentClick);
    document.addEventListener("submit", handleDocumentSubmit);
    document.addEventListener("keydown", handleDocumentKeydown);
    window.addEventListener("hashchange", () => syncPageWithHash({ scroll: true }));

    updateHash(getCurrentPage(), { replace: true });
    renderApp();
  </script>
