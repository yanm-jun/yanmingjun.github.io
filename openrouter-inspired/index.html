<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RouteLayer</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #09090b;
      --muted: #71717a;
      --muted-2: #a1a1aa;
      --line: #e4e4e7;
      --line-2: #f4f4f5;
      --card: #ffffff;
      --dark: #09090b;
      --dark-2: #18181b;
      --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.05);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --max: 1280px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { min-height: 100vh; }
    a, button, input { font: inherit; }
    button { cursor: pointer; border: 0; background: none; }

    .page-glow {
      position: fixed;
      inset: 0 0 auto 0;
      height: 540px;
      pointer-events: none;
      background: radial-gradient(circle at top, rgba(24,24,27,.08), rgba(255,255,255,0) 42%);
      z-index: -1;
    }

    .container { width: min(var(--max), calc(100vw - 32px)); margin: 0 auto; }
    .hidden { display: none !important; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid rgba(228,228,231,.8);
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(16px);
    }

    .topbar-inner {
      height: 64px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      text-decoration: none;
      flex: 0 0 auto;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: var(--dark);
      color: white;
      display: grid;
      place-items: center;
      box-shadow: var(--shadow);
      font-size: 16px;
    }

    .brand-name { font-size: 16px; font-weight: 600; letter-spacing: -.02em; }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 256px;
      height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--line-2);
      color: var(--muted);
    }

    .search-box .kbd {
      border: 1px solid var(--line);
      background: white;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .nav-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1 1 auto;
    }

    .nav { display: flex; align-items: center; gap: 4px; }
    .nav-btn {
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      color: var(--muted);
      transition: .2s ease;
    }
    .nav-btn:hover { background: #f4f4f5; color: var(--text); }
    .nav-btn.active { background: var(--dark); color: white; }

    .auth { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      transition: .2s ease;
    }
    .btn-light {
      color: var(--text);
      background: white;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .btn-light:hover { background: #fafafa; }
    .btn-dark {
      color: white;
      background: var(--dark);
      box-shadow: 0 10px 24px rgba(9,9,11,.12);
    }
    .btn-dark:hover { background: #18181b; }
    .auth .btn { padding: 10px 16px; border-radius: 999px; }

    .mobile-toggle {
      display: none;
      width: 40px;
      height: 40px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: white;
      color: var(--muted);
      margin-left: auto;
    }

    .mobile-menu {
      display: none;
      border-top: 1px solid var(--line);
      background: white;
      padding: 16px;
    }

    .mobile-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 8px;
    }

    .mobile-btn {
      padding: 12px 16px;
      border-radius: 12px;
      text-align: left;
      font-size: 14px;
      background: #fafafa;
      color: #3f3f46;
    }
    .mobile-btn.active { background: var(--dark); color: white; }

    main { padding-bottom: 24px; }

    .section { padding: 40px 0 64px; }
    .section-hero { padding: 40px 0 96px; }
    .center { text-align: center; }
    .hero-wrap { max-width: 900px; margin: 0 auto; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      color: #52525b;
      font-size: 14px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 20px 0 0;
      font-size: clamp(40px, 6vw, 64px);
      line-height: 1.05;
      letter-spacing: -.04em;
      font-weight: 600;
    }

    .lead {
      max-width: 760px;
      margin: 20px auto 0;
      font-size: clamp(16px, 2vw, 20px);
      line-height: 1.75;
      color: #52525b;
    }

    .hero-actions { margin-top: 32px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .chip-row { margin-top: 32px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .chip {
      display: inline-flex;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid var(--line);
      background: white;
      color: #52525b;
    }
    .chip.dark { border-color: rgba(255,255,255,.12); background: rgba(255,255,255,.06); color: #d4d4d8; }

    .stats-grid,
    .feature-grid,
    .model-grid,
    .apps-grid,
    .docs-grid,
    .fusion-grid,
    .plan-grid,
    .enterprise-grid {
      display: grid;
      gap: 16px;
    }

    .stats-grid { max-width: 1024px; margin: 48px auto 0; grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .feature-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .model-grid, .apps-grid, .docs-grid, .fusion-grid, .plan-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .enterprise-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .stat-card { padding: 20px; text-align: center; transition: .2s ease; }
    .stat-card:hover { transform: translateY(-4px); }
    .stat-card .value { font-size: 32px; font-weight: 700; letter-spacing: -.03em; }
    .stat-card .label { margin-top: 4px; font-size: 14px; color: var(--muted); }

    .feature-card { overflow: hidden; transition: .2s ease; }
    .feature-card:hover { transform: translateY(-6px); box-shadow: 0 14px 32px rgba(0,0,0,.07); }
    .feature-visual { height: 224px; padding: 12px; }
    .feature-body { padding: 0 24px 24px; display: flex; flex-direction: column; gap: 12px; }
    .feature-title { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 600; letter-spacing: -.02em; }
    .feature-icon { width: 36px; height: 36px; border-radius: 12px; display: grid; place-items: center; background: #f4f4f5; }
    .feature-desc { margin: 0; font-size: 14px; line-height: 1.7; color: var(--muted); }
    .inline-link { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500; color: var(--text); }

    .visual-box {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: linear-gradient(to bottom right, #fafafa, white);
    }

    .visual-cloud { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; padding: 16px; }
    .visual-dot {
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: white;
      font-size: 10px;
      font-weight: 600;
      color: #52525b;
      box-shadow: var(--shadow);
    }

    .visual-route { display: flex; align-items: center; justify-content: center; padding: 16px; background: linear-gradient(to bottom, white, #fafafa); }
    .visual-route-inner { width: 100%; max-width: 220px; }
    .route-pill { margin-bottom: 16px; padding: 10px 16px; border-radius: 12px; text-align: center; font-size: 12px; font-weight: 500; background: var(--dark); color: white; }
    .route-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .route-node { height: 40px; border: 1px solid var(--line); border-radius: 12px; background: white; display: grid; place-items: center; font-weight: 700; color: #3f3f46; }

    .visual-chart { position: relative; background: linear-gradient(to bottom, white, #fafafa); }
    .visual-chart-grid {
      position: absolute; inset: 16px;
      border-radius: 16px;
      background-image:
        linear-gradient(to top, rgba(24,24,27,.03) 1px, transparent 1px),
        linear-gradient(to right, rgba(24,24,27,.03) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .visual-chart svg { position: relative; z-index: 1; width: 100%; height: 100%; }

    .visual-shield { display: flex; align-items: center; justify-content: center; background: linear-gradient(to bottom, #fafafa, white); }
    .visual-shield-circle {
      width: 112px; height: 112px; border-radius: 999px; background: #f4f4f5; display: grid; place-items: center;
      color: #71717a; font-size: 40px;
    }

    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 32px;
    }
    .section-head p { margin: 0 0 8px; font-size: 14px; font-weight: 500; color: var(--muted); }
    .section-head h2 { margin: 0; font-size: clamp(28px, 4vw, 36px); letter-spacing: -.03em; }
    .section-head .desc { margin-top: 8px; max-width: 720px; font-size: 15px; line-height: 1.7; color: var(--muted); }

    .dark-panel {
      border: 1px solid var(--line);
      border-radius: 30px;
      background: var(--dark);
      color: white;
      box-shadow: 0 20px 48px rgba(9,9,11,.12);
      padding: 32px;
    }

    .split-grid { display: grid; gap: 24px; }
    .split-5 { grid-template-columns: 3fr 2fr; }
    .split-2 { grid-template-columns: 1.1fr .9fr; }
    .split-docs { grid-template-columns: 280px 1fr; }
    .split-chat { grid-template-columns: 260px 1fr 300px; }

    .code-shell { margin-top: 24px; overflow: hidden; border-radius: 24px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); }
    .code-head { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,.12); font-size: 12px; color: #d4d4d8; }
    pre {
      margin: 0;
      padding: 16px;
      overflow-x: auto;
      font-size: 14px;
      line-height: 1.8;
      color: #e4e4e7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .panel { padding: 24px; }
    .mini-card { padding: 16px; border-radius: 16px; background: #fafafa; }
    .muted { color: var(--muted); }
    .small { font-size: 14px; }
    .title { font-size: 20px; font-weight: 600; letter-spacing: -.02em; }
    .kpi { font-size: 18px; font-weight: 600; }

    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }

    .list { display: flex; flex-direction: column; gap: 12px; }
    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #fafafa;
      color: #3f3f46;
      font-size: 14px;
    }
    .list-item.active { background: var(--dark); color: white; }

    .chat-bubble { max-width: 78%; padding: 16px 20px; border-radius: 22px; font-size: 14px; line-height: 1.8; }
    .chat-user { margin-left: auto; background: var(--dark); color: white; }
    .chat-assistant { border: 1px solid var(--line); background: #fafafa; color: #3f3f46; }
    .chat-input { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 1px solid var(--line); border-radius: 24px; background: white; box-shadow: var(--shadow); }
    .chat-input input { flex: 1; border: 0; outline: 0; background: transparent; font-size: 14px; }

    .table-shell { overflow: hidden; border: 1px solid var(--line); border-radius: 16px; }
    .table-head, .table-row { display: grid; grid-template-columns: 72px 1fr 120px 120px; }
    .table-head { background: #fafafa; padding: 12px 16px; font-size: 11px; font-weight: 600; letter-spacing: .14em; color: var(--muted); text-transform: uppercase; }
    .table-row { padding: 16px; border-top: 1px solid var(--line); font-size: 14px; align-items: center; }

    .bar-row { margin-bottom: 16px; }
    .bar-head { display: flex; align-items: center; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
    .bar-track { height: 12px; border-radius: 999px; background: #f4f4f5; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--dark); border-radius: 999px; }

    .plan { padding: 24px; border-radius: 30px; border: 1px solid var(--line); box-shadow: var(--shadow); }
    .plan.dark { background: var(--dark); color: white; border-color: var(--dark); }
    .plan .price { margin-top: 12px; font-size: 40px; font-weight: 600; letter-spacing: -.03em; }
    .plan ul { margin: 24px 0 0; padding: 0; list-style: none; display: grid; gap: 12px; }
    .plan li { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; }

    .footer {
      border-top: 1px solid var(--line);
      background: #fafafa;
      margin-top: 24px;
    }
    .footer-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 40px; padding: 56px 0; }
    .footer h4 { margin: 0 0 12px; font-size: 16px; }
    .footer ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
    .footer button { font-size: 14px; color: #52525b; text-align: left; }
    .footer button:hover { color: var(--text); }

    @media (max-width: 1100px) {
      .feature-grid, .enterprise-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .model-grid, .apps-grid, .docs-grid, .fusion-grid, .plan-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .split-5, .split-2, .split-chat, .split-docs, .footer-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 900px) {
      .nav-wrap, .auth { display: none; }
      .mobile-toggle { display: inline-flex; }
      .mobile-menu.show { display: block; }
      .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 700px) {
      .feature-grid, .model-grid, .apps-grid, .docs-grid, .fusion-grid, .plan-grid, .enterprise-grid { grid-template-columns: 1fr; }
      .section-head { flex-direction: column; align-items: flex-start; }
      .table-head, .table-row { grid-template-columns: 56px 1fr 90px 90px; }
      .container { width: min(var(--max), calc(100vw - 24px)); }
      .section-hero { padding-top: 28px; }
    }
  </style>
</head>
<body>
  <div class="page-glow"></div>

  <header class="topbar">
    <div class="container topbar-inner">
      <button class="brand" data-go="Home" aria-label="RouteLayer 首页">
        <div class="brand-mark">✦</div>
        <div class="brand-name">RouteLayer</div>
      </button>

      <div class="nav-wrap">
        <div class="search-box">
          <span>⌕</span>
          <span style="flex:1">Search</span>
          <span class="kbd">/</span>
        </div>
        <nav class="nav" id="desktop-nav"></nav>
      </div>

      <div class="auth" id="top-auth">
        <button class="btn btn-light" data-action="sign-in">Sign In</button>
        <button class="btn btn-dark" data-action="sign-up">Sign Up</button>
      </div>

      <button class="mobile-toggle" id="mobile-toggle" aria-label="打开菜单">☰</button>
    </div>
    <div class="mobile-menu" id="mobile-menu">
      <div class="mobile-grid" id="mobile-nav"></div>
    </div>
  </header>

  <main id="app"></main>
  <div id="cta-panel-shell" class="hidden" role="dialog" aria-modal="true" aria-labelledby="cta-panel-title" style="position:fixed;top:80px;right:16px;z-index:60;width:min(420px,calc(100vw - 32px));max-height:calc(100vh - 96px);overflow:auto;">
    <div id="cta-panel" class="card panel"></div>
  </div>

  <footer class="footer">
    <div class="container footer-grid">
      <div>
        <div class="brand" style="pointer-events:none">
          <div class="brand-mark">✦</div>
          <div>
            <div class="brand-name">RouteLayer</div>
            <div class="small muted">Unified AI model routing</div>
          </div>
        </div>
        <p class="small muted" style="max-width:360px; line-height:1.8; margin-top:16px;">A single-file HTML version that keeps the current visual style and page structure stable.</p>
      </div>
      <div>
        <h4>Product</h4>
        <ul id="footer-product"></ul>
      </div>
      <div>
        <h4>Resources</h4>
        <ul id="footer-resources"></ul>
      </div>
    </div>
  </footer>

  <script>
    const APP_CONFIG = createAppConfig();
    const ROUTES = APP_CONFIG.ROUTES;
    const PAGES = Object.freeze(Object.keys(ROUTES));
    const NAV_PAGES = Object.freeze(PAGES.filter(page => page !== "Account"));
    const PRODUCT_LINKS = ["Models", "Chat", "Apps", "Pricing"];
    const RESOURCE_LINKS = ["Docs", "Rankings", "Enterprise", "Fusion"];
    const STATS = [["70T", "Monthly Tokens"], ["5M+", "Global Users"], ["60+", "Active Providers"], ["300+", "Models"]];
    const MODELS = [
      { slug: "gpt-4-1-turbo", name: "GPT-4.1 Turbo", provider: "OpenAI", latency: "380ms", price: "$8 / 1M", tag: "Popular", detail: "Reliable for structured coding flows, product copilots, and broad production chat coverage." },
      { slug: "claude-4-5-sonnet", name: "Claude 4.5 Sonnet", provider: "Anthropic", latency: "420ms", price: "$12 / 1M", tag: "Balanced", detail: "Strong for polished responses, enterprise support flows, and mixed reasoning plus writing workloads." },
      { slug: "gemini-2-5-pro", name: "Gemini 2.5 Pro", provider: "Google", latency: "330ms", price: "$10 / 1M", tag: "Reasoning", detail: "Well suited to long context synthesis, broad retrieval tasks, and fast analytical comparisons." },
      { slug: "deepseek-r1", name: "DeepSeek R1", provider: "DeepSeek", latency: "510ms", price: "$5 / 1M", tag: "Value", detail: "Useful as a lower-cost fallback for reasoning-heavy tasks that still need strong price discipline." },
      { slug: "llama-4-maverick", name: "Llama 4 Maverick", provider: "Meta", latency: "355ms", price: "$6 / 1M", tag: "Open-weight", detail: "Good when teams want open-weight flexibility, portable deployments, and controllable fine-tuning paths." },
      { slug: "mistral-large", name: "Mistral Large", provider: "Mistral", latency: "340ms", price: "$7 / 1M", tag: "Fast", detail: "A practical fast-response option for interactive assistants, summarization, and lightweight routing tiers." }
    ];
    const APPS = [
      { name: "PromptDesk", category: "Workspace", desc: "Team prompt studio with evals and deployment branches.", users: "128k", growth: "+22%" },
      { name: "StackPilot", category: "Developer", desc: "Docs-aware copilots for support and infra workflows.", users: "92k", growth: "+17%" },
      { name: "InsightLoop", category: "Analytics", desc: "Automated research summaries and shared AI reports.", users: "71k", growth: "+14%" },
      { name: "AgentBase", category: "Agent", desc: "Deploy multi-tool agents with budgets and audit logs.", users: "55k", growth: "+28%" },
      { name: "ScriptForge", category: "Creator", desc: "Generate ads, hooks, and long-form content fast.", users: "63k", growth: "+12%" },
      { name: "VoiceMesh", category: "Voice", desc: "Realtime voice routing across low-latency providers.", users: "39k", growth: "+33%" }
    ];
    const DOCS = [
      {
        slug: "quickstart",
        title: "Quickstart",
        desc: "Send your first OpenAI-style request through one unified endpoint.",
        tag: "Start here",
        body: "RouteLayer keeps the first request path intentionally small: choose one model, send one request to one endpoint, then keep the provider decision in routing config instead of scattering it through your app.",
        code: `curl https://api.routelayer.dev/v1/chat/completions \\
  -H "Authorization: Bearer rl_demo_key" \\
  -H "Content-Type: application/json" \\
  -d '{
    "model": "gpt-4-1-turbo",
    "messages": [{"role":"user","content":"Hello from RouteLayer"}]
  }'`
      },
      {
        slug: "provider-routing",
        title: "Provider Routing",
        desc: "Sort by latency, price, or preferred providers with failover.",
        tag: "Routing",
        body: "Routing rules let teams express simple priorities like preferred providers, maximum price bands, or fallback order without rewriting application code every time the model market changes.",
        code: `{
  "route": {
    "strategy": "latency-first",
    "preferredProviders": ["OpenAI", "Anthropic"],
    "fallbackProviders": ["Google", "DeepSeek"]
  }
}`
      },
      {
        slug: "data-policies",
        title: "Data Policies",
        desc: "Allow or block providers and logging paths for enterprise traffic.",
        tag: "Security",
        body: "Policy controls make it possible to keep sensitive traffic on approved providers only, block logging for regulated workloads, and separate high-trust traffic from general experimentation.",
        code: `{
  "policy": {
    "allowProviders": ["OpenAI", "Anthropic"],
    "blockLogging": true,
    "environment": "enterprise-support"
  }
}`
      },
      {
        slug: "model-selection",
        title: "Model Selection",
        desc: "Choose strong defaults for chat, coding, and reasoning.",
        tag: "Guides",
        body: "A practical default stack usually starts with one balanced model, one reasoning specialist, and one lower-cost fallback. That gives product teams enough coverage to ship without locking into a single vendor.",
        code: `const defaults = {
  chat: "claude-4-5-sonnet",
  coding: "gpt-4-1-turbo",
  reasoning: "gemini-2-5-pro",
  fallback: "deepseek-r1"
};`
      },

    function createStorageAdapter(getStore) {
      return {
        getValue(storageKey, fallback = null) {
          try {
            const raw = getStore().getItem(storageKey);
            return raw === null ? fallback : JSON.parse(raw);
          } catch (error) {
            return fallback;
          }
        },
        setValue(storageKey, value) {
          try {
            getStore().setItem(storageKey, JSON.stringify(value));
          } catch (error) {
            return value;
          }
          return value;
        },
        removeValue(storageKey) {
          try {
            getStore().removeItem(storageKey);
          } catch (error) {
            return;
          }
        },
        getCollection(storageKey) {
          const parsed = this.getValue(storageKey, []);
          return Array.isArray(parsed) ? parsed : [];
        },
        setCollection(storageKey, items) {
          return this.setValue(storageKey, Array.isArray(items) ? items : []);
        },
        appendCollectionItem(storageKey, item) {
          const items = this.getCollection(storageKey);
          items.unshift(item);
          this.setCollection(storageKey, items);
          return item;
        }
      };
    }

    const resourceMemoryCache = Object.create(null);

    function buildResourceCacheKey(prefix, slug) {

    function isCacheFresh(entry, ttl) {
      return Boolean(
        entry &&
        typeof entry.cachedAt === "number" &&
        Date.now() - entry.cachedAt < ttl
      );
    }

    function getCachedResource(cacheKey, ttl) {
      const memoryEntry = resourceMemoryCache[cacheKey];
      if (isCacheFresh(memoryEntry, ttl)) return memoryEntry.value;

      const storedEntry = repositories.cache.getValue(cacheKey);
      if (!isCacheFresh(storedEntry, ttl)) return null;

      resourceMemoryCache[cacheKey] = storedEntry;
      return storedEntry.value;
    }

    function setCachedResource(cacheKey, value) {
      const entry = {
        cachedAt: Date.now(),
        value
      };
      resourceMemoryCache[cacheKey] = entry;
      repositories.cache.setValue(cacheKey, entry);
      return value;
    }

    function pickFirstValue(source, keys, fallback = "") {
      for (const key of keys) {
        const value = source && source[key];
        if (value !== undefined && value !== null && value !== "") return value;
      }
      return fallback;
    }

    function normalizeAllowedValue(value, allowedValues, fallback) {
      const normalizedValue = String(value || "").trim().toLowerCase();
      return allowedValues.find(option => option.toLowerCase() === normalizedValue) || fallback;
    }

    function formatMetricValue(value, suffix = "ms", fallback = "n/a") {
      if (typeof value === "number" && Number.isFinite(value)) return `${value}${suffix}`;
      if (typeof value === "string" && value.trim()) return value;
      return fallback;
    }

    function formatPriceValue(value) {
      if (typeof value === "number" && Number.isFinite(value)) return `$${value} / 1M`;
      if (typeof value === "string" && value.trim()) return value;
      if (value && typeof value === "object") {
        const display = pickFirstValue(value, ["display", "label", "formatted", "input"]);
        if (display) return String(display);
      }
      return "Custom";
    }

    function mergeEntityData(existing, next) {
      const merged = { ...(existing || {}) };
      Object.keys(next || {}).forEach((key) => {

        if (value !== undefined && value !== null && value !== "") {

      if (payload.data && typeof payload.data === "object") {

      return [];

        if (value && typeof value === "object" && !Array.isArray(value)) return value;

      if (payload.data && typeof payload.data === "object") {

    async function requestJson(path, { method = "GET", body, headers = {}, timeout = APP_CONFIG.API_TIMEOUT } = {}) {
      const controller = typeof AbortController !== "undefined" ? new AbortController() : null;
      const timerApi = typeof window !== "undefined" ? window : globalThis;
      const timeoutId = controller && typeof timerApi.setTimeout === "function"
        ? timerApi.setTimeout(() => controller.abort(), timeout)
        : null;

      if (typeof fetch !== "function") {
        return {
          ok: false,
          status: 0,
          error: {
            message: "Fetch is unavailable in this environment.",
            payload: null
          },
          mode: "live"
        };
      }

      try {
        const response = await fetch(buildApiUrl(path), {
          method,
          headers: {
            Accept: "application/json",
            "Content-Type": "application/json",
            ...headers
          },
          body: body ? JSON.stringify(body) : undefined,
          signal: controller ? controller.signal : undefined
        });
        const contentType = response.headers && response.headers.get ? response.headers.get("content-type") || "" : "";
        const payload = contentType.includes("application/json")
          ? await response.json()
          : { message: await response.text() };

        if (!response.ok) {
          throw createRequestError(payload.message || `Request failed with status ${response.status}.`, {
            status: response.status,
            payload
          });
        }

        return {
          ok: true,
          status: response.status,
          data: payload,
          mode: "live"
        };
      } catch (error) {
        const message = error.name === "AbortError"
          ? "Request timed out."
          : error.message || "Request failed.";
        return {
          ok: false,
          status: error.status || 0,
          error: {
            message,
            payload: error.payload || null
          },
          mode: "live"
        };
      } finally {
        if (timeoutId && typeof timerApi.clearTimeout === "function") timerApi.clearTimeout(timeoutId);
      }
    }

    async function runGatewayAction({ liveHandler, mockHandler, fallbackMessage, mockSuccessMessage = "Saved locally.", liveSuccessMessage = "Submitted successfully." }) {

        try {
          return createGatewaySuccess({

          });
        } catch (error) {
          return createGatewayFailure(error.message || "Unable to save locally.", {
            mode: "mock",
            warning
          });
        }
      }

      if (!isLiveGatewayEnabled()) {
        return runMockAction(mockSuccessMessage);
      }

      let liveResult;
      try {
        liveResult = await liveHandler();
      } catch (error) {
        liveResult = createGatewayFailure(error.message || "Request failed.", {
          mode: "live",
          status: error.status || 0
        });
      }

      if (liveResult.ok) {
        return createGatewaySuccess({
          mode: "live",
          data: liveResult.data,
          message: liveResult.data && liveResult.data.message ? liveResult.data.message : liveSuccessMessage,
          status: liveResult.status || 200
        });
      }

      if (!FEATURE_FLAGS.enableMockFallback) {
        return createGatewayFailure(
          liveResult.error && liveResult.error.message ? liveResult.error.message : liveResult.message || "Request failed.",
          {
            mode: "live",
            status: liveResult.status || 0
          }
        );
      }

      return runMockAction(
        fallbackMessage,
        liveResult.error && liveResult.error.message ? liveResult.error.message : liveResult.message || "Live request failed.",
        true
      );
    }

    function createAuthenticatedSession(mode, values, payload = {}, authMode = getGatewayMode()) {
      const payloadUser = payload && typeof payload === "object"
        ? payload.user || payload.currentUser || payload.account || null
        : null;
      return {
        isAuthenticated: true,
        currentUser: {
          name: payloadUser && payloadUser.name ? payloadUser.name : values.name || "",
          email: payloadUser && payloadUser.email ? payloadUser.email : values.email || ""
        },
        authMode,
        lastAuthAction: mode,
        updatedAt: new Date().toISOString()
      };
    }

    function getInitialSessionState() {
      const storedSession = repositories.session.getSession();
      if (!storedSession || typeof storedSession !== "object") {
        return createEmptySessionState();
      }

      const currentUser = storedSession.currentUser && typeof storedSession.currentUser === "object"
        ? {
            name: storedSession.currentUser.name || "",
            email: storedSession.currentUser.email || ""
          }
        : null;

      return {
        isAuthenticated: Boolean(storedSession.isAuthenticated && currentUser && currentUser.email),
        currentUser,
        authMode: storedSession.authMode || getGatewayMode(),
        lastAuthAction: storedSession.lastAuthAction || null,
        updatedAt: storedSession.updatedAt || null
      };
    }

    function syncSessionState(session) {
      repositories.session.setSession(session);
      updateAppState("session", session);
      return session;
    }

    function clearSessionState() {
      const nextSession = createEmptySessionState();
      repositories.session.clearSession();
      updateAppState("session", nextSession);
      return nextSession;
    }

    function getCurrentSessionState() {
      return getAppState("session");
    }

    function getSessionUser() {
      const session = getCurrentSessionState();
      return session && session.currentUser ? session.currentUser : null;
    }

    function getSessionUserEmail() {
      const user = getSessionUser();
      return user && user.email ? user.email.trim().toLowerCase() : "";
    }

    function getSessionDisplayName() {
      const user = getSessionUser();
      if (!user) return "Guest";
      if (user.name) return user.name;
      if (user.email) return user.email.split("@")[0];
      return "Member";
    }

    function formatSessionTimestamp(value) {
      if (!value) return "No active session";
      try {
        return new Date(value).toLocaleString("zh-CN", {
          hour12: false
        });
      } catch (error) {
        return String(value);
      }
    }

    function matchesUserEmail(record, keys, email) {
      const normalizedEmail = String(email || "").trim().toLowerCase();
      if (!normalizedEmail) return false;
      return keys.some((key) => String(record && record[key] ? record[key] : "").trim().toLowerCase() === normalizedEmail);
    }

    function createAuthService() {
      return {
        async submitAuthDraft(mode, values, context = {}) {
          const ownerEmail = normalizeOwnerEmail(values && values.email ? values.email : "");
          const result = await authGateway.submitDraft(mode, values, context);
          if (!result.ok) {
            if (ownerEmail) {
              appServices.recovery.upsertRecoveryItem({
                id: `auth:${mode}`,
                ownerEmail,
                type: "auth",
                title: mode === "sign-up" ? "Sign up needs another try" : "Sign in needs another try",
                description: result.message || "RouteLayer could not finish authentication right now.",
                sourceMode: getResultSourceMode(result, getGatewayMode()),
                recommendedAction: mode === "sign-up" ? "Retry sign up" : "Retry auth",
                targetRoute: "Account",
                targetAction: mode,
                targetSection: "account-recovery-section",
                severity: !result.fallbackUsed ? "error" : "warning"
              });
            }
            return result;
          }

          const session = syncSessionState(
            createAuthenticatedSession(mode, values, result.data, result.mode)
          );
          updateAppState("apiKeys", createInitialApiKeysState());
          updateAppState("usage", createInitialUsageState());
          updateAppState("settings", createInitialRequestSettingsState());
          updateAppState("presets", createInitialPresetState());
          updateAppState("onboarding", createInitialOnboardingState());
          updateAppState("conversion", createInitialConversionState());
          updateAppState("recovery", createInitialRecoveryState());
          const sessionEmail = session.currentUser && session.currentUser.email ? session.currentUser.email : ownerEmail;
          if (result.fallbackUsed) {
            appServices.recovery.upsertRecoveryItem({
              id: `auth:${mode}`,
              ownerEmail: sessionEmail,
              type: "auth",
              title: mode === "sign-up" ? "Live sign up fell back locally" : "Live sign in fell back locally",
              description: formatGatewayNotice(result, "You are using a local session for now. Retry auth when the live endpoint is ready.") || "A local session was created after the live auth request failed.",
              sourceMode: getResultSourceMode(result, "fallback"),
              recommendedAction: "Retry auth",
              targetRoute: "Account",
              targetAction: mode,
              targetSection: "account-recovery-section",
              severity: "warning"
            });
          } else if (sessionEmail) {
            appServices.recovery.resolveRecoveryItem(`auth:sign-in`, { ownerEmail: sessionEmail });
            appServices.recovery.resolveRecoveryItem(`auth:sign-up`, { ownerEmail: sessionEmail });
          }
          const postAuth = appServices.conversion.consumeIntent({
            sourcePage: context.page,
            sourceAction: mode,
            selectedPlan: context.plan || "",
            authAction: mode
          }, session.currentUser && session.currentUser.email ? session.currentUser.email : "");
          return {
            ...result,
            session,
            postAuth
          };
        },
        getSession() {
          return getAppState("session");
        },
        clearSession() {
          return clearSessionState();
        }
      };
    }

    function createLeadService() {

            targetRoute: "Enterprise",

            actionContext: {
              page: "Enterprise",
              cta: context.cta || "Talk to Sales",

          targetSection: "account-quickstart-section",

        const config = getLeadRecoveryConfig(kind, context);
        const sourceMode = getResultSourceMode(result, getGatewayMode());
        if (!result.ok || result.fallbackUsed) {
          appServices.recovery.upsertRecoveryItem({
            ...config,
            ownerEmail,
            description: (!result.ok
              ? result.message
              : formatGatewayNotice(result, "The request completed locally, but the live endpoint still needs another try."))
              || "This request still needs a follow-up action.",
            sourceMode,
            severity: !result.ok && !result.fallbackUsed ? "error" : "warning"
          });
          return result;
        }

        appServices.recovery.resolveRecoveryItem(config.id, { ownerEmail });
        return result;
      }

      return {
        async submitApiKeyRequest(values, context = {}) {
          return handleLeadRecovery("api-key", values, context, await leadGateway.submitApiKeyRequest(values, context));

    function createApiKeyService() {
      let listPromise = null;

      function getCurrentOwnerEmail() {
        return getSessionUserEmail();
      }

      function getApiKeyState() {
        return getAppState("apiKeys");
      }

      function applyApiKeyState(patch) {
        return updateAppState("apiKeys", patch);
      }

      function resetState(notice = "") {
        return applyApiKeyState({
          ...createInitialApiKeysState(),
          notice
        });
      }

      function upsertApiKeyItem(item) {
        const apiKeyState = getApiKeyState();
        const nextItems = [item, ...apiKeyState.items.filter(existingItem => existingItem.id !== item.id)];
        applyApiKeyState({
          items: nextItems
        });
        return nextItems;
      }

      function syncApiKeyRecovery(result, description) {
        const ownerEmail = getCurrentOwnerEmail();
        if (!ownerEmail) return result;

        if (!result.ok || result.fallbackUsed) {
          appServices.recovery.upsertRecoveryItem({
            id: "api_key:manage",
            ownerEmail,
            type: "api_key",
            title: "API key management still needs attention",
            description: description || result.message || "A developer key action still needs a retry.",
            sourceMode: getResultSourceMode(result, getGatewayMode()),
            recommendedAction: "Open API Keys",
            targetRoute: "Account",
            targetSection: "account-api-keys-section",
            severity: !result.ok && !result.fallbackUsed ? "error" : "warning"
          });
          return result;
        }

        appServices.recovery.resolveRecoveryItem("api_key:manage", { ownerEmail });
        return result;
      }

      return {
        listApiKeys() {
          return getApiKeyState().items;
        },
        getLastCreatedApiKey() {
          return getApiKeyState().lastCreatedKey;
        },
        clearCreatedApiKey(notice = "") {
          applyApiKeyState({
            lastCreatedKey: null,
            notice,
            status: getApiKeyState().status === "idle" ? "ready" : getApiKeyState().status
          });
          return getApiKeyState();
        },
        async ensureApiKeysLoaded({ force = false } = {}) {
          const apiKeyState = getApiKeyState();
          const ownerEmail = getCurrentOwnerEmail();
          if (!ownerEmail) {
            if (
              apiKeyState.ownerEmail ||
              apiKeyState.notice !== "Sign in to manage API keys." ||
              apiKeyState.items.length ||
              apiKeyState.lastCreatedKey
            ) {
              resetState("Sign in to manage API keys.");
            }
            return createGatewaySuccess({
              mode: "mock",
              data: { items: [] },
              message: "Sign in to manage API keys."
            });
          }

          if (!force && apiKeyState.hasLoaded && apiKeyState.ownerEmail === ownerEmail) {
            return createGatewaySuccess({
              mode: apiKeyState.lastSourceMode,
              data: { items: apiKeyState.items },
              message: apiKeyState.notice || "API keys loaded."
            });
          }

          if (listPromise && !force) return listPromise;

          applyApiKeyState({
            ownerEmail,
            status: "loading",
            notice: isLiveGatewayEnabled() ? "Refreshing API keys..." : "",
            hasLoaded: false
          });

          listPromise = (async () => {
            const result = await apiKeyGateway.listApiKeys();
            if (!result.ok) {
              applyApiKeyState({
                ownerEmail,
                status: "error",
                notice: result.message || "Unable to load API keys right now.",
                hasLoaded: false
              });
              return result;
            }

            const normalized = normalizeApiKeyListResponse(result.data, result, ownerEmail);
            applyApiKeyState({
              items: normalized.items,
              ownerEmail,
              status: "ready",
              notice: formatGatewayNotice(result, "Showing local keys."),
              lastCreatedKey: null,
              lastSourceMode: normalized.sourceMode,
              hasLoaded: true
            });

            return {
              ...result,
              data: normalized
            };
          })().finally(() => {
            listPromise = null;
          });

          return listPromise;
        },
        async createApiKey(values) {
          const ownerEmail = getCurrentOwnerEmail();
          if (!ownerEmail) {
            return createGatewayFailure("Sign in before creating an API key.", { mode: getGatewayMode() });
          }

          if (getApiKeyState().isSubmitting) {
            return createGatewayFailure("Please wait for the current API key action to finish.", { mode: getGatewayMode() });
          }

          applyApiKeyState({
            ownerEmail,
            isSubmitting: true,
            notice: "Creating API key..."
          });

          const result = await apiKeyGateway.createApiKey(values);
          if (!result.ok) {
            appServices.usage.recordAccountLog({
              type: "api_key",
              label: `API key create failed · ${values.name}`,
              summary: result.message || "Unable to create an API key right now.",
              ok: false,
              sourceMode: result.mode || getGatewayMode()
            });
            applyApiKeyState({
              isSubmitting: false,
              notice: result.message || "Unable to create an API key right now."
            });
            syncApiKeyRecovery(result, result.message || "Unable to create an API key right now.");
            return result;
          }

          const normalized = normalizeApiKeyCreateResponse(result.data, result, ownerEmail);
          upsertApiKeyItem(normalized.listItem);
          applyApiKeyState({
            ownerEmail,
            status: "ready",
            notice: formatGatewayNotice(result, "API key created."),
            lastCreatedKey: normalized.createdKey,
            lastSourceMode: normalized.sourceMode,
            hasLoaded: true,
            isSubmitting: false
          });
          appServices.usage.recordAccountLog({
            type: "api_key",
            label: `API key created · ${normalized.listItem.name}`,
            summary: normalized.listItem.valueMasked,
            sourceMode: normalized.sourceMode
          });
          syncApiKeyRecovery(result, formatGatewayNotice(result, "A local API key was created because the live endpoint failed."));

          return {
            ...result,
            data: normalized
          };
        },
        async revokeApiKey(id) {
          const ownerEmail = getCurrentOwnerEmail();
          if (!ownerEmail) {
            return createGatewayFailure("Sign in before managing API keys.", { mode: getGatewayMode() });
          }

          if (getApiKeyState().isSubmitting) {
            return createGatewayFailure("Please wait for the current API key action to finish.", { mode: getGatewayMode() });
          }

          const currentItem = getApiKeyState().items.find(item => item.id === id);
          if (!currentItem) {
            return createGatewayFailure("That API key could not be found.", { mode: getGatewayMode() });
          }

          applyApiKeyState({
            isSubmitting: true,
            notice: "Revoking API key..."
          });

          const result = await apiKeyGateway.revokeApiKey(id);
          if (!result.ok) {
            appServices.usage.recordAccountLog({
              type: "api_key",
              label: `API key revoke failed · ${currentItem.name}`,
              summary: result.message || "Unable to revoke this API key right now.",
              ok: false,
              sourceMode: result.mode || getGatewayMode()
            });
            applyApiKeyState({
              isSubmitting: false,
              notice: result.message || "Unable to revoke this API key right now."
            });
            syncApiKeyRecovery(result, result.message || "Unable to revoke this API key right now.");
            return result;
          }

          const normalized = normalizeApiKeyRevokeResponse(result.data, result, currentItem, ownerEmail);
          upsertApiKeyItem(normalized.item);
          applyApiKeyState({
            status: "ready",
            notice: formatGatewayNotice(result, "API key revoked."),
            lastSourceMode: normalized.sourceMode,
            hasLoaded: true,
            isSubmitting: false,
            lastCreatedKey: getApiKeyState().lastCreatedKey && getApiKeyState().lastCreatedKey.id === id ? null : getApiKeyState().lastCreatedKey
          });
          appServices.usage.recordAccountLog({
            type: "api_key",
            label: `API key revoked · ${normalized.item.name}`,
            summary: normalized.item.valueMasked,
            sourceMode: normalized.sourceMode
          });
          syncApiKeyRecovery(result, formatGatewayNotice(result, "The revoke completed locally after the live endpoint failed."));

          return {
            ...result,
            data: normalized
          };
        },
        async copyApiKeyValue(id) {
          const createdKey = getApiKeyState().lastCreatedKey;
          if (!createdKey || createdKey.id !== id || !createdKey.valueFull) {
            return { ok: false, message: "The full key value is only available immediately after creation." };
          }

          const clipboard = typeof navigator !== "undefined" && navigator.clipboard ? navigator.clipboard : null;
          if (!clipboard || typeof clipboard.writeText !== "function") {
            return { ok: false, message: "Clipboard access is unavailable in this browser." };
          }

          await clipboard.writeText(createdKey.valueFull);
          this.clearCreatedApiKey("API key copied. Store it securely.");
          return {
            ok: true,
            message: "API key copied. Store it securely."
          };
        },
        resetState
      };
    }

    function createUsageService() {
      let loadPromise = null;

      function getUsageState() {
        return getAppState("usage");
      }

      function applyUsageState(patch) {
        return updateAppState("usage", patch);
      }

      function getCurrentOwnerEmail() {
        return getSessionUserEmail();
      }

      function resetState(notice = "") {
        return applyUsageState({
          ...createInitialUsageState(),
          notice
        });
      }

      function buildLocalLogs(ownerEmail, limit = RECENT_ACCOUNT_LOG_LIMIT) {
        return normalizeLogItems(repositories.accountLogs.getCollectionByOwner(ownerEmail), { ownerEmail }).slice(0, limit);
      }

      function buildLocalSummary(ownerEmail, sourceMode = "mock") {
        return buildUsageSummaryFromLogs(repositories.accountLogs.getCollectionByOwner(ownerEmail), sourceMode);
      }

      function updateUsageFromOwner(ownerEmail, sourceMode, notice = "") {
        const localLogs = buildLocalLogs(ownerEmail);
        applyUsageState({
          summary: buildLocalSummary(ownerEmail, sourceMode),
          items: localLogs,
          ownerEmail,
          status: "ready",
          notice,
          lastSourceMode: sourceMode,
          hasLoaded: true
        });
        return getUsageState();
      }

      return {
        getUsageSummary() {
          return getUsageState().summary;
        },
        listRecentLogs() {
          return getUsageState().items;
        },
        resetState,
        async ensureUsageLoaded({ force = false } = {}) {
          const usageState = getUsageState();
          const ownerEmail = getCurrentOwnerEmail();

          if (!ownerEmail) {
            if (
              usageState.ownerEmail ||
              usageState.notice !== "Sign in to view usage and recent logs." ||
              usageState.items.length ||
              usageState.summary.totalRequests
            ) {
              resetState("Sign in to view usage and recent logs.");
            }
            return createGatewaySuccess({
              mode: "mock",
              data: {
                summary: createInitialUsageState().summary,
                items: []
              },
              message: "Sign in to view usage and recent logs."
            });
          }

          if (!force && usageState.hasLoaded && usageState.ownerEmail === ownerEmail) {
            return createGatewaySuccess({
              mode: usageState.lastSourceMode,
              data: {
                summary: usageState.summary,
                items: usageState.items
              },
              message: usageState.notice || "Usage loaded."
            });
          }

          if (loadPromise && !force) return loadPromise;

          applyUsageState({
            ownerEmail,
            status: "loading",
            notice: isLiveGatewayEnabled() ? "Refreshing usage and logs..." : "",
            hasLoaded: false
          });

          loadPromise = (async () => {
            const [summaryResult, logsResult] = await Promise.all([
              usageGateway.getUsageSummary(),
              usageGateway.listRecentLogs(RECENT_ACCOUNT_LOG_LIMIT)
            ]);

            if (!summaryResult.ok && !logsResult.ok) {
              applyUsageState({
                ownerEmail,
                status: "error",
                notice: summaryResult.message || logsResult.message || "Unable to load usage right now.",
                hasLoaded: false
              });
              return summaryResult.message ? summaryResult : logsResult;
            }

            const fallbackSummary = buildLocalSummary(ownerEmail, getUsageResponseMode(summaryResult.ok ? summaryResult : logsResult));
            const summary = summaryResult.ok
              ? normalizeUsageSummary(summaryResult.data, summaryResult, fallbackSummary)
              : fallbackSummary;
            const logPayload = logsResult.ok
              ? normalizeRecentLogsResponse(logsResult.data, logsResult, ownerEmail, RECENT_ACCOUNT_LOG_LIMIT)
              : {
                  items: buildLocalLogs(ownerEmail),
                  sourceMode: summary.sourceMode,
                  message: logsResult.message || "Showing local logs."
                };
            const notice = [
              summaryResult.ok ? formatGatewayNotice(summaryResult, "Showing local activity.") : summaryResult.message,
              logsResult.ok ? formatGatewayNotice(logsResult, "Showing local logs.") : logsResult.message
            ].filter(Boolean).join(" ").trim();

            applyUsageState({
              summary,
              items: logPayload.items,
              ownerEmail,
              status: "ready",
              notice,
              lastSourceMode: logPayload.sourceMode || summary.sourceMode,
              hasLoaded: true
            });

            return createGatewaySuccess({
              mode: logPayload.sourceMode || summary.sourceMode,
              data: {
                summary,
                items: logPayload.items
              },
              message: notice || "Usage loaded."
            });
          })().finally(() => {
            loadPromise = null;
          });

          return loadPromise;
        },
        recordAccountLog(entry) {
          const ownerEmail = normalizeOwnerEmail(entry && entry.ownerEmail ? entry.ownerEmail : getCurrentOwnerEmail());
          if (!ownerEmail) return null;

          const sourceMode = entry && entry.sourceMode ? entry.sourceMode : getGatewayMode();
          const logItem = normalizeLogItem({
            ...entry,
            id: entry && entry.id ? entry.id : generateAccountLogId(),
            createdAt: entry && entry.createdAt ? entry.createdAt : new Date().toISOString(),
            ownerEmail,
            sourceMode,
            status: entry && entry.status ? entry.status : resolveLogStatus(entry && entry.ok !== false, sourceMode)
          }, {
            ownerEmail,
            sourceMode
          });

          repositories.accountLogs.prepend(ownerEmail, logItem, ACCOUNT_LOG_STORAGE_LIMIT);

          const usageState = getUsageState();
          if (usageState.ownerEmail === ownerEmail || !usageState.ownerEmail) {
            updateUsageFromOwner(ownerEmail, sourceMode, usageState.notice);
          }

          return logItem;
        }
      };
    }

    function createSettingsService() {
      let loadPromise = null;

          notice
        });
      }

      function getDefaultSettings(sourceMode = "mock") {
        return createDefaultRequestSettings(sourceMode);
      }

      function getNoticeForResult(result, hasStoredSettings) {
        if (result && result.fallbackUsed) {
          return formatGatewayNotice(
            result,
            hasStoredSettings ? "Showing local request settings." : "Using local system defaults."
          );
        }
        if (result && result.mode === "live") {
          return hasStoredSettings ? "Request settings loaded." : "Using system defaults until you save account settings.";
        }
        return hasStoredSettings ? "Using saved request settings." : "Using system defaults until you save account settings.";
      }

      return {
        getRequestSettings() {
          return getSettingsState().settings;
        },
        getEffectiveRequestSettings() {
          const settingsState = getSettingsState();
          const baseSourceMode = settingsState.lastSourceMode || pickFirstValue(settingsState.settings, ["sourceMode"], "mock");
          return {
            ...getDefaultSettings(baseSourceMode),
            ...(settingsState.settings || {}),
            sourceMode: pickFirstValue(settingsState.settings, ["sourceMode"], baseSourceMode)
          };
        },
        getCurrentSettingsSummary() {
          const settingsState = getSettingsState();
          const effectiveSettings = this.getEffectiveRequestSettings();
          const hasStoredSettings = Boolean(getCurrentOwnerEmail() && settingsState.hasStoredSettings);
          return {
            label: hasStoredSettings ? "Account defaults" : "System default",
            text: `${effectiveSettings.defaultModel} · ${effectiveSettings.responseMode} · ${effectiveSettings.routingPreset}`,
            sourceMode: effectiveSettings.sourceMode || settingsState.lastSourceMode || "mock",
            updatedAt: hasStoredSettings ? effectiveSettings.updatedAt : null,
            hasStoredSettings
          };
        },
        resetState,
        async ensureRequestSettingsLoaded({ force = false } = {}) {
          const settingsState = getSettingsState();
          const ownerEmail = getCurrentOwnerEmail();

          if (!ownerEmail) {
            if (
              settingsState.ownerEmail ||
              settingsState.notice !== "Sign in to save request settings." ||
              settingsState.hasStoredSettings
            ) {
              resetState("Sign in to save request settings.");
            }
            return createGatewaySuccess({
              mode: "mock",
              data: {
                settings: getDefaultSettings("mock"),
                hasStoredSettings: false
              },
              message: "Sign in to save request settings."
            });
          }

          if (!force && settingsState.hasLoaded && settingsState.ownerEmail === ownerEmail) {
            return createGatewaySuccess({
              mode: settingsState.lastSourceMode,
              data: {
                settings: this.getEffectiveRequestSettings(),
                hasStoredSettings: settingsState.hasStoredSettings
              },
              message: settingsState.notice || "Request settings loaded."
            });
          }

          if (loadPromise && !force) return loadPromise;

          applySettingsState({
            ownerEmail,
            status: "loading",
            notice: isLiveGatewayEnabled() ? "Refreshing request settings..." : "",
            hasLoaded: false
          });

          loadPromise = (async () => {
            const result = await settingsGateway.getRequestSettings();
            if (!result.ok) {
              applySettingsState({
                ownerEmail,
                status: "error",
                notice: result.message || "Unable to load request settings right now.",
                hasLoaded: false
              });
              return result;
            }

            const normalized = normalizeRequestSettingsResponse(result.data, result, ownerEmail);
            applySettingsState({
              settings: normalized.settings,
              ownerEmail,
              status: "ready",
              notice: getNoticeForResult(result, normalized.hasStoredSettings),
              lastSourceMode: normalized.sourceMode,
              hasLoaded: true,
              isSubmitting: false,
              hasStoredSettings: normalized.hasStoredSettings
            });

            return {
              ...result,
              data: normalized
            };
          })().finally(() => {
            loadPromise = null;
          });

          return loadPromise;

          if (!ownerEmail) {
            return createGatewayFailure("Sign in before saving request settings.", { mode: getGatewayMode() });
          }

          const settingsState = getSettingsState();
          if (settingsState.isSubmitting) {
            return createGatewayFailure("Please wait for the current settings action to finish.", { mode: getGatewayMode() });
          }

          applySettingsState({
            ownerEmail,
            isSubmitting: true,
            notice: "Saving request settings..."
          });

          const result = await settingsGateway.saveRequestSettings(values);
          if (!result.ok) {
            applySettingsState({
              isSubmitting: false,
              notice: result.message || "Unable to save request settings right now."
            });
            return result;
          }

          const normalized = normalizeRequestSettingsResponse(result.data, result, ownerEmail);
          applySettingsState({
            settings: normalized.settings,
            ownerEmail,
            status: "ready",
            notice: formatGatewayNotice(result, "Request settings saved locally.") || "Request settings saved.",
            lastSourceMode: normalized.sourceMode,
            hasLoaded: true,
            isSubmitting: false,
            hasStoredSettings: true
          });

          return {
            ...result,
            data: {
              ...normalized,
              hasStoredSettings: true
            }
          };
        },
        async resetRequestSettings() {
          const ownerEmail = getCurrentOwnerEmail();
          if (!ownerEmail) {
            return createGatewayFailure("Sign in before resetting request settings.", { mode: getGatewayMode() });
          }

          const settingsState = getSettingsState();
          if (settingsState.isSubmitting) {
            return createGatewayFailure("Please wait for the current settings action to finish.", { mode: getGatewayMode() });
          }

          applySettingsState({
            ownerEmail,
            isSubmitting: true,
            notice: "Resetting request settings..."
          });

          const result = await settingsGateway.resetRequestSettings();
          if (!result.ok) {
            applySettingsState({
              isSubmitting: false,
              notice: result.message || "Unable to reset request settings right now."

          }

          const normalized = normalizeRequestSettingsResponse(result.data, result, ownerEmail);
          applySettingsState({
            settings: normalized.settings,
            ownerEmail,
            status: "ready",
            notice: formatGatewayNotice(result, "Request settings reset locally.") || "Request settings reset to defaults.",
            lastSourceMode: normalized.sourceMode,
            hasLoaded: true,
            isSubmitting: false,
            hasStoredSettings: false
          });

          return {
            ...result,
            data: {
              ...normalized,
              hasStoredSettings: false
            }
          };
        }
      };

      }

      function applyPresetItems(items, meta = {}) {
        const presetState = getPresetState();
        const nextItems = normalizePresetItems(items, {
          ownerEmail: meta.ownerEmail || presetState.ownerEmail || getCurrentOwnerEmail(),
          sourceMode: meta.sourceMode || presetState.lastSourceMode || "mock",
          activeId: meta.activeId || ""
        });
        applyPresetState({
          items: nextItems,
          ownerEmail: meta.ownerEmail !== undefined ? meta.ownerEmail : presetState.ownerEmail,
          status: meta.status || "ready",
          notice: meta.notice !== undefined ? meta.notice : presetState.notice,
          lastSourceMode: meta.sourceMode || presetState.lastSourceMode || "mock",
          hasLoaded: meta.hasLoaded !== undefined ? meta.hasLoaded : true,
          isSubmitting: meta.isSubmitting !== undefined ? meta.isSubmitting : false
        });
        return nextItems;
      }

      function getPresetNotice(result, fallbackText) {
        return formatGatewayNotice(result, fallbackText) || "";
      }

      return {
        listPresets() {
          return getPresetState().items;
        },
        getActivePreset() {
          return getActivePresetFromItems(getPresetState().items);
        },
        getEffectiveRequestProfile() {
          const activePreset = this.getActivePreset();
          if (activePreset) {
            return {
              defaultModel: activePreset.defaultModel,
              responseMode: activePreset.responseMode,
              routingPreset: activePreset.routingPreset,
              sourceMode: activePreset.sourceMode,
              profileSource: "preset",
              presetId: activePreset.id,
              presetName: activePreset.name,
              updatedAt: activePreset.updatedAt
            };
          }

          const settingsState = getAppState("settings");
          const settings = appServices.settings.getEffectiveRequestSettings();
          const hasStoredSettings = Boolean(getCurrentOwnerEmail() && settingsState.hasStoredSettings);

          return {
            defaultModel: settings.defaultModel,
            responseMode: settings.responseMode,
            routingPreset: settings.routingPreset,
            sourceMode: settings.sourceMode || settingsState.lastSourceMode || "mock",
            profileSource: hasStoredSettings ? "settings" : "system",
            presetId: "",
            presetName: "",
            updatedAt: hasStoredSettings ? settings.updatedAt : null
          };
        },
        getCurrentProfileSummary() {
          const profile = this.getEffectiveRequestProfile();
          if (profile.profileSource === "preset") {
            return {
              label: `Active preset: ${profile.presetName}`,
              text: formatRequestProfileText(profile),
              sourceMode: profile.sourceMode,
              updatedAt: profile.updatedAt,
              profileSource: "preset"
            };
          }
          if (profile.profileSource === "settings") {
            return {
              label: "Account defaults",
              text: formatRequestProfileText(profile),
              sourceMode: profile.sourceMode,
              updatedAt: profile.updatedAt,
              profileSource: "settings"
            };
          }
          return {
            label: "System default",
            text: formatRequestProfileText(profile),
            sourceMode: profile.sourceMode,
            updatedAt: null,
            profileSource: "system"
          };
        },
        resetState,
        async ensurePresetsLoaded({ force = false } = {}) {
          const presetState = getPresetState();
          const ownerEmail = getCurrentOwnerEmail();

          if (!ownerEmail) {
            if (
              presetState.ownerEmail ||
              presetState.notice !== "Sign in to manage presets." ||
              presetState.items.length
            ) {
              resetState("Sign in to manage presets.");
            }
            return createGatewaySuccess({
              mode: "mock",
              data: {
                items: [],
                activePreset: null
              },
              message: "Sign in to manage presets."
            });
          }

          if (!force && presetState.hasLoaded && presetState.ownerEmail === ownerEmail) {
            return createGatewaySuccess({
              mode: presetState.lastSourceMode,
              data: {
                items: presetState.items,
                activePreset: this.getActivePreset()
              },
              message: presetState.notice || "Presets loaded."
            });
          }

          if (loadPromise && !force) return loadPromise;

          applyPresetState({
            ownerEmail,
            status: "loading",
            notice: isLiveGatewayEnabled() ? "Refreshing presets..." : "",
            hasLoaded: false
          });

          loadPromise = (async () => {
            const result = await presetGateway.listPresets();
            if (!result.ok) {
              applyPresetState({
                ownerEmail,
                status: "error",
                notice: result.message || "Unable to load presets right now.",
                hasLoaded: false
              });
              return result;
            }

            const normalized = normalizePresetListResponse(result.data, result, ownerEmail);
            applyPresetItems(normalized.items, {
              ownerEmail,
              sourceMode: normalized.sourceMode,
              status: "ready",
              notice: getPresetNotice(result, "Showing local presets."),
              hasLoaded: true,
              isSubmitting: false
            });

            return {
              ...result,
              data: normalized
            };
          })().finally(() => {
            loadPromise = null;
          });

          return loadPromise;
        },
        async createPreset(values) {
          const ownerEmail = getCurrentOwnerEmail();
          if (!ownerEmail) {
            return createGatewayFailure("Sign in before creating a preset.", { mode: getGatewayMode() });
          }

          const presetState = getPresetState();
          if (presetState.isSubmitting) {
            return createGatewayFailure("Please wait for the current preset action to finish.", { mode: getGatewayMode() });
          }

          applyPresetState({
            ownerEmail,
            isSubmitting: true,
            notice: "Creating preset..."
          });

          const result = await presetGateway.createPreset(values);
          if (!result.ok) {
            applyPresetState({
              isSubmitting: false,
              notice: result.message || "Unable to create a preset right now."
            });
            return result;
          }

          const normalizedItem = {
            ...normalizePresetMutationResponse(result.data, result, {
              ...values,
              isActive: true,
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString()
            }, ownerEmail).item,
            isActive: true
          };
          const nextItems = applyPresetItems(
            [
              normalizedItem,
              ...presetState.items.filter(item => item.id !== normalizedItem.id).map(item => ({ ...item, isActive: false }))
            ],
            {
              ownerEmail,
              sourceMode: normalizedItem.sourceMode,
              status: "ready",
              notice: getPresetNotice(result, "Preset created locally.") || "Preset created and activated.",
              hasLoaded: true,
              isSubmitting: false,
              activeId: normalizedItem.id
            }
          );

          return {
            ...result,
            data: {
              items: nextItems,
              activePreset: getActivePresetFromItems(nextItems),
              sourceMode: normalizedItem.sourceMode
            }
          };
        },
        async activatePreset(id) {
          const ownerEmail = getCurrentOwnerEmail();
          if (!ownerEmail) {
            return createGatewayFailure("Sign in before activating a preset.", { mode: getGatewayMode() });
          }

          const presetState = getPresetState();
          if (presetState.isSubmitting) {
            return createGatewayFailure("Please wait for the current preset action to finish.", { mode: getGatewayMode() });
          }

          const currentItem = presetState.items.find(item => item.id === id);
          if (!currentItem) {
            return createGatewayFailure("That preset could not be found.", { mode: getGatewayMode() });
          }

          applyPresetState({
            isSubmitting: true,
            notice: "Activating preset..."
          });

          const result = await presetGateway.activatePreset(id);
          if (!result.ok) {
            applyPresetState({
              isSubmitting: false,
              notice: result.message || "Unable to activate this preset right now."
            });
            return result;
          }

          const normalizedItem = {
            ...normalizePresetMutationResponse(result.data, result, {
              ...currentItem,
              isActive: true,
              updatedAt: new Date().toISOString()
            }, ownerEmail).item,
            isActive: true
          };
          const nextItems = applyPresetItems(
            presetState.items.map(item => (item.id === normalizedItem.id ? normalizedItem : { ...item, isActive: false })),
            {
              ownerEmail,
              sourceMode: normalizedItem.sourceMode,
              status: "ready",
              notice: getPresetNotice(result, "Preset activated locally.") || "Preset activated.",
              hasLoaded: true,
              isSubmitting: false,
              activeId: normalizedItem.id
            }
          );

          return {
            ...result,
            data: {
              items: nextItems,
              activePreset: getActivePresetFromItems(nextItems),
              sourceMode: normalizedItem.sourceMode
            }
          };
        },
        async deletePreset(id) {
          const ownerEmail = getCurrentOwnerEmail();
          if (!ownerEmail) {
            return createGatewayFailure("Sign in before deleting a preset.", { mode: getGatewayMode() });
          }

          const presetState = getPresetState();
          if (presetState.isSubmitting) {
            return createGatewayFailure("Please wait for the current preset action to finish.", { mode: getGatewayMode() });
          }

          const currentItem = presetState.items.find(item => item.id === id);
          if (!currentItem) {
            return createGatewayFailure("That preset could not be found.", { mode: getGatewayMode() });
          }

          applyPresetState({
            isSubmitting: true,
            notice: "Deleting preset..."
          });

          const result = await presetGateway.deletePreset(id);
          if (!result.ok) {
            applyPresetState({
              isSubmitting: false,
              notice: result.message || "Unable to delete this preset right now."
            });
            return result;
          }

          const normalizedList = normalizePresetListResponse(result.data, result, ownerEmail);
          const nextItems = extractPresetListPayload(result.data).length
            ? applyPresetItems(normalizedList.items, {
                ownerEmail,
                sourceMode: normalizedList.sourceMode,
                status: "ready",
                notice: getPresetNotice(result, "Preset deleted locally.") || "Preset deleted.",
                hasLoaded: true,
                isSubmitting: false
              })
            : applyPresetItems(
                presetState.items.filter(item => item.id !== id),
                {
                  ownerEmail,
                  sourceMode: getPresetResponseMode(result),
                  status: "ready",
                  notice: getPresetNotice(result, "Preset deleted locally.") || "Preset deleted.",
                  hasLoaded: true,
                  isSubmitting: false
                }
              );

          return {
            ...result,
            data: {
              items: nextItems,
              activePreset: getActivePresetFromItems(nextItems),
              sourceMode: getPresetResponseMode(result)
            }
          };
        }
      };
    }

      function resetState(notice = "") {

          ...createInitialOnboardingState(),
