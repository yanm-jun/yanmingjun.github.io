        });
      }

      function applyNormalizedProgress(progress, meta = {}) {
        applyOnboardingState({
          steps: progress.steps,
          progress: progress.progress,
          nextStep: progress.nextStep,
          dismissed: progress.dismissed,
          ownerEmail: meta.ownerEmail || getOnboardingState().ownerEmail,
          status: meta.status || "ready",
          notice: meta.notice !== undefined ? meta.notice : getOnboardingState().notice,
          lastSourceMode: meta.sourceMode || progress.sourceMode || getOnboardingState().lastSourceMode,
          hasLoaded: meta.hasLoaded !== undefined ? meta.hasLoaded : true,
          isSubmitting: meta.isSubmitting !== undefined ? meta.isSubmitting : false
        });
        return getOnboardingState();
      }

      return {
        getOnboardingProgress() {
          const onboardingState = getOnboardingState();
          return {
            steps: onboardingState.steps,
            progress: onboardingState.progress,
            nextStep: onboardingState.nextStep,
            dismissed: onboardingState.dismissed,
            sourceMode: onboardingState.lastSourceMode,
            notice: onboardingState.notice
          };
        },
        getNextRecommendedStep() {
          return getOnboardingState().nextStep;
        },
        resetState,
        async ensureOnboardingLoaded({ force = false } = {}) {
          const onboardingState = getOnboardingState();
          const ownerEmail = getCurrentOwnerEmail();

          if (!ownerEmail) {
            if (
              onboardingState.ownerEmail ||
              onboardingState.notice !== "Sign in to view quickstart." ||
              onboardingState.dismissed
            ) {
              resetState("Sign in to view quickstart.");
            }
            return createGatewaySuccess({
              mode: "mock",
              data: this.getOnboardingProgress(),
              message: "Sign in to view quickstart."
            });
          }

          if (!force && onboardingState.hasLoaded && onboardingState.ownerEmail === ownerEmail) {
            return createGatewaySuccess({
              mode: onboardingState.lastSourceMode,
              data: this.getOnboardingProgress(),
              message: onboardingState.notice || "Quickstart loaded."
            });
          }

          if (loadPromise && !force) return loadPromise;

          applyOnboardingState({
            ownerEmail,
            status: "loading",
            notice: isLiveGatewayEnabled() ? "Refreshing quickstart..." : "",
            hasLoaded: false
          });

          loadPromise = (async () => {
            const result = await onboardingGateway.getOnboardingProgress();
            if (!result.ok) {
              applyOnboardingState({
                ownerEmail,
                status: "error",
                notice: result.message || "Unable to load quickstart right now.",
                hasLoaded: false
              });
              return result;
            }

            const normalized = normalizeOnboardingProgressResponse(result.data, result, ownerEmail);
            applyNormalizedProgress(normalized, {
              ownerEmail,
              status: "ready",
              notice: formatGatewayNotice(result, "Showing local quickstart state."),
              sourceMode: normalized.sourceMode,
              hasLoaded: true,
              isSubmitting: false
            });

            return {
              ...result,
              data: normalized
            };
          })().finally(() => {
            loadPromise = null;
          });

          return loadPromise;
        },
        async markOnboardingStep(stepId, payload = {}) {
          const ownerEmail = getCurrentOwnerEmail();
          if (!ownerEmail) {
            return createGatewayFailure("Sign in before updating quickstart.", { mode: getGatewayMode() });
          }

          const existingStep = getOnboardingState().steps.find(step => step.id === stepId);
          if (existingStep && existingStep.status === "done") {
            return createGatewaySuccess({
              mode: getOnboardingState().lastSourceMode || "derived",
              data: this.getOnboardingProgress(),
              message: "Quickstart already up to date."
            });
          }

          const onboardingState = getOnboardingState();
          if (onboardingState.isSubmitting) {
            return createGatewayFailure("Please wait for the current quickstart action to finish.", { mode: getGatewayMode() });
          }

          applyOnboardingState({
            isSubmitting: true,
            notice: "Updating quickstart..."
          });

          const result = await onboardingGateway.markOnboardingStep(stepId, payload);
          if (!result.ok) {
            applyOnboardingState({
              isSubmitting: false,
              notice: result.message || "Unable to update quickstart right now."
            });
            return result;
          }

          const normalized = normalizeOnboardingProgressResponse(result.data, result, ownerEmail);
          applyNormalizedProgress(normalized, {
            ownerEmail,
            status: "ready",
            notice: formatGatewayNotice(result, "Quickstart updated locally.") || "Quickstart updated.",
            sourceMode: normalized.sourceMode,
            hasLoaded: true,
            isSubmitting: false
          });

          return {
            ...result,
            data: normalized
          };
        },
        async setDismissed(dismissed = true) {
          const ownerEmail = getCurrentOwnerEmail();
          if (!ownerEmail) {
            return createGatewayFailure("Sign in before updating quickstart visibility.", { mode: getGatewayMode() });
          }

          const onboardingState = getOnboardingState();
          if (onboardingState.isSubmitting) {
            return createGatewayFailure("Please wait for the current quickstart action to finish.", { mode: getGatewayMode() });
          }

          applyOnboardingState({
            isSubmitting: true,
            notice: dismissed ? "Hiding quickstart..." : "Restoring quickstart..."
          });

          const result = await onboardingGateway.dismissOnboarding(dismissed);
          if (!result.ok) {
            applyOnboardingState({
              isSubmitting: false,
              notice: result.message || "Unable to update quickstart right now."
            });
            return result;
          }

          const normalized = normalizeOnboardingProgressResponse(result.data, result, ownerEmail);
          applyNormalizedProgress(normalized, {
            ownerEmail,
            status: "ready",
            notice: dismissed ? "Quickstart hidden." : "Quickstart restored.",
            sourceMode: normalized.sourceMode,
            hasLoaded: true,
            isSubmitting: false
          });

          return {
            ...result,
            data: normalized
          };
        }
      };
    }

    function createConversionService() {
      function getConversionState() {
        return getAppState("conversion");
      }

      function applyConversionState(patch) {
        return updateAppState("conversion", patch);
      }

      function resetState(notice = "") {
        repositories.conversion.clearIntent();
        return applyConversionState({
          ...createInitialConversionState(),
          notice
        });
      }

      function getStoredIntent() {
        return normalizeConversionIntent(repositories.conversion.getIntent());
      }

      function syncIntent(intent, notice = "") {
        if (!intent) {
          repositories.conversion.clearIntent();
          applyConversionState({
            intent: null,
            notice
          });
          return null;
        }

        const normalizedIntent = normalizeConversionIntent(intent);
        repositories.conversion.setIntent(normalizedIntent);
        applyConversionState({
          intent: normalizedIntent,
          notice
        });
        return normalizedIntent;
      }

      function getCurrentIntent() {
        const stateIntent = getConversionState().intent;
        return normalizeConversionIntent(stateIntent || getStoredIntent());
      }

      function getPreferredOnboardingStep(ownerEmail, intent) {
        const steps = getDerivedOnboardingSteps(ownerEmail);
        const byId = (id) => steps.find(step => step.id === id) || null;
        const nextStep = getNextOnboardingStep(steps);

        if (!intent) return nextStep;

        const isApiKeyPath = intent.sourceAction === CONVERSION_SOURCE_ACTIONS.getApiKey
          || intent.sourceAction === CONVERSION_SOURCE_ACTIONS.getStarted
          || (intent.sourceAction === CONVERSION_SOURCE_ACTIONS.pricingPlan && intent.selectedPlan !== "Enterprise");
        if (isApiKeyPath) {
          return byId("create-api-key") && byId("create-api-key").status !== "done"
            ? byId("create-api-key")
            : nextStep;
        }

        const isCatalogPath = intent.sourceAction === CONVERSION_SOURCE_ACTIONS.exploreModels
          || intent.sourcePage === "models"
          || intent.sourcePage === "docs";
        if (isCatalogPath) {
          return byId("review-catalog") && byId("review-catalog").status !== "done"
            ? byId("review-catalog")
            : nextStep;
        }

        return nextStep;
      }

      function getPostAuthDestination(intentInput = null, ownerEmail = getSessionUserEmail()) {
        const intent = normalizeConversionIntent(intentInput || getCurrentIntent());
        const preferredStep = getPreferredOnboardingStep(ownerEmail, intent);
        const defaultDestination = {
          page: "Account",
          sectionId: preferredStep && preferredStep.id === "create-api-key"
            ? "account-api-keys-section"
            : preferredStep && preferredStep.id === "save-defaults"
              ? "account-presets-section"
              : "account-quickstart-section",
          actionKey: "",
          actionContext: {},
          nextStepId: preferredStep ? preferredStep.id : "",
          nextStepLabel: preferredStep ? preferredStep.title : "Open your account",
          summaryMessage: "Finish the next setup step from your account."
        };

        if (!intent) return defaultDestination;

        if (intent.selectedPlan === "Enterprise" || intent.sourceAction === CONVERSION_SOURCE_ACTIONS.talkToSales || intent.sourceAction === CONVERSION_SOURCE_ACTIONS.requestDemo) {
          return {
            page: "Enterprise",
            sectionId: "",
            actionKey: intent.sourceAction === CONVERSION_SOURCE_ACTIONS.requestDemo ? "request-demo" : "talk-to-sales",
            actionContext: {
              page: "Enterprise",
              cta: intent.selectedPlan === "Enterprise" ? "Enterprise plan" : intent.sourceAction,
              plan: intent.selectedPlan || ""
            },
            nextStepId: preferredStep ? preferredStep.id : "",
            nextStepLabel: intent.sourceAction === CONVERSION_SOURCE_ACTIONS.requestDemo ? "Request Demo" : "Talk to Sales",
            summaryMessage: "Continue the enterprise conversion flow from the sales entry point."
          };
        }

        if (intent.sourceAction === CONVERSION_SOURCE_ACTIONS.exploreModels || intent.sourcePage === "models") {
          return {
            page: "Models",
            sectionId: "",
            actionKey: "",
            actionContext: {},
            nextStepId: preferredStep ? preferredStep.id : "",
            nextStepLabel: preferredStep ? preferredStep.title : "Explore Models",
            summaryMessage: "Continue exploring the model catalog."
          };
        }

        if (intent.sourcePage === "docs") {
          return {
            page: "Docs",
            sectionId: "",
            actionKey: "",
            actionContext: {},
            nextStepId: preferredStep ? preferredStep.id : "",
            nextStepLabel: preferredStep ? preferredStep.title : "Review docs",
            summaryMessage: "Continue where you left off in docs."
          };
        }

        return defaultDestination;
      }

      function getReadableActionLabel(intent) {
        if (!intent) return "";
        if (intent.selectedPlan) return intent.selectedPlan;
        if (intent.sourceAction === CONVERSION_SOURCE_ACTIONS.getApiKey) return "Get API Key";
        if (intent.sourceAction === CONVERSION_SOURCE_ACTIONS.getStarted || intent.sourceAction === CONVERSION_SOURCE_ACTIONS.pricingPlan) return "Get started";
        if (intent.sourceAction === CONVERSION_SOURCE_ACTIONS.talkToSales) return "Talk to Sales";
        if (intent.sourceAction === CONVERSION_SOURCE_ACTIONS.requestDemo) return "Request Demo";
        if (intent.sourceAction === CONVERSION_SOURCE_ACTIONS.exploreModels) return "Explore Models";
        if (intent.sourceAction === CONVERSION_SOURCE_ACTIONS.signIn) return "Sign In";
        if (intent.sourceAction === CONVERSION_SOURCE_ACTIONS.signUp) return "Sign Up";
        return intent.sourceAction;
      }

      return {
        recordIntent(intentInput) {
          const existingIntent = getCurrentIntent();
          const nextIntent = normalizeConversionIntent(intentInput);
          if (!nextIntent) return null;

          if (
            existingIntent &&
            existingIntent.status === "pending" &&
            (nextIntent.sourceAction === CONVERSION_SOURCE_ACTIONS.signIn || nextIntent.sourceAction === CONVERSION_SOURCE_ACTIONS.signUp)
          ) {
            return syncIntent({
              ...existingIntent,
              timestamp: nextIntent.timestamp,
              authAction: nextIntent.sourceAction
            });
          }

          return syncIntent({
            ...nextIntent,
            status: "pending",
            dismissed: false
          });
        },
        getCurrentIntent,
        clearIntent() {
          return resetState();
        },
        dismissSummary() {
          const currentIntent = getCurrentIntent();
          if (!currentIntent || currentIntent.status !== "consumed") return null;
          return syncIntent({
            ...currentIntent,
            dismissed: true
          }, "Conversion prompt hidden.");
        },
        consumeIntent(intentInput = null, ownerEmail = getSessionUserEmail()) {
          const currentIntent = normalizeConversionIntent(intentInput || getCurrentIntent());
          if (!currentIntent) return {
            intent: null,
            destination: getPostAuthDestination(null, ownerEmail)
          };

          const destination = getPostAuthDestination(currentIntent, ownerEmail);
          const consumedIntent = syncIntent({
            ...currentIntent,
            ownerEmail,
            status: "consumed",
            dismissed: false,
            nextStepId: destination.nextStepId,
            nextStepLabel: destination.nextStepLabel,
            destinationPage: destination.page,
            accountSection: destination.sectionId,
            actionKey: destination.actionKey
          }, destination.summaryMessage);

          return {
            intent: consumedIntent,
            destination
          };
        },
        getAccountSummary() {
          const account = appServices.account.getCurrentAccount();
          const currentIntent = getCurrentIntent();
          if (!account.isAuthenticated || !currentIntent || currentIntent.status !== "consumed" || currentIntent.dismissed) {
            return null;
          }

          if (currentIntent.ownerEmail && currentIntent.ownerEmail !== getSessionUserEmail()) {
            resetState();
            return null;
          }

          if (currentIntent.nextStepId) {
            const currentStep = getDerivedOnboardingSteps(getSessionUserEmail()).find(step => step.id === currentIntent.nextStepId) || null;
            if (currentStep && currentStep.status === "done") {
              resetState();
              return null;
            }
          }

          return {
            sourceLabel: formatConversionSourceLabel(currentIntent),
            actionLabel: getReadableActionLabel(currentIntent),
            nextStepLabel: currentIntent.nextStepLabel || "Open your account",
            destination: getPostAuthDestination(currentIntent, getSessionUserEmail()),
            intent: currentIntent
          };
        },
        getPostAuthDestination
      };
    }

    function createRecoveryService() {

      function getRecoveryState() {
        return getAppState("recovery");
      }

      function applyRecoveryState(patch) {
        return updateAppState("recovery", patch);

      function getCurrentOwnerEmail() {

          ...createInitialRecoveryState(),
          notice
        });
      }

      function getStoredItems(ownerEmail) {
        return normalizeRecoveryItems(repositories.recovery.getCollectionByOwner(ownerEmail), {
          ownerEmail
        });
      }

      function setStoredItems(ownerEmail, items) {
        const normalizedItems = normalizeRecoveryItems(items, {
          ownerEmail
        }).slice(0, RECOVERY_STORAGE_LIMIT);
        repositories.recovery.setCollectionByOwner(ownerEmail, normalizedItems);
        return normalizedItems;
      }

      function upsertStoredItem(ownerEmail, item) {
        const nextItems = [
          normalizeRecoveryItem(item, { ownerEmail }),
          ...getStoredItems(ownerEmail).filter(existingItem => existingItem.id !== item.id)
        ].slice(0, RECOVERY_STORAGE_LIMIT);
        return setStoredItems(ownerEmail, nextItems);
      }

      function getOnboardingRecoveryItem(ownerEmail) {
        const onboardingRecord = getOnboardingStoredRecord(ownerEmail);
        if (onboardingRecord.dismissed) return null;
        const steps = getDerivedOnboardingSteps(ownerEmail);
        const nextStep = getNextOnboardingStep(steps);
        if (!nextStep) return null;
        const progress = getOnboardingProgressSummary(steps);
        return normalizeRecoveryItem({
          id: "derived:onboarding",
          type: "onboarding",
          title: "Resume quickstart",
          description: `${progress.label} complete. ${nextStep.title} is still waiting for the next real action.`,
          status: "open",
          createdAt: nextStep.completedAt || new Date().toISOString(),
          lastSeenAt: new Date().toISOString(),
          sourceMode: "derived",
          recommendedAction: "Resume onboarding",
          targetRoute: nextStep.linkedRoute || "Account",
          targetAction: "",
          targetSection: nextStep.accountSection || (nextStep.linkedRoute === "Account" ? "account-quickstart-section" : ""),
          severity: "info",
          ownerEmail
        }, {
          ownerEmail,
          sourceMode: "derived"
        });
      }

      function getConversionRecoveryItem(ownerEmail) {
        const intent = normalizeConversionIntent(repositories.conversion.getIntent());
        if (!intent || intent.status !== "pending" || intent.dismissed) return null;
        if (intent.ownerEmail && intent.ownerEmail !== ownerEmail) return null;

        const destination = appServices.conversion.getPostAuthDestination(intent, ownerEmail);
        return normalizeRecoveryItem({
          id: "derived:conversion",
          type: "conversion",
          title: "Resume your signup path",
          description: `You started from ${formatConversionSourceLabel(intent)}${intent.selectedPlan ? ` / ${intent.selectedPlan}` : ""}. Continue with ${destination.nextStepLabel || "the next recommended step"}.`,
          status: "open",
          createdAt: intent.timestamp || new Date().toISOString(),
          lastSeenAt: new Date().toISOString(),
          sourceMode: "derived",
          recommendedAction: "Continue",
          targetRoute: destination.page || "Account",
          targetAction: destination.actionKey || "",
          targetSection: destination.sectionId || "",
          severity: "warning",
          ownerEmail,
          actionContext: destination.actionContext || {}
        }, {
          ownerEmail,
          sourceMode: "derived"
        });
      }

      function getDerivedItems(ownerEmail) {
        return [getConversionRecoveryItem(ownerEmail), getOnboardingRecoveryItem(ownerEmail)].filter(Boolean);
      }

      function getOpenItems(ownerEmail) {
        const storedItems = getStoredItems(ownerEmail);
        const storedMap = storedItems.reduce((map, item) => {
          map[item.id] = item;
          return map;
        }, {});

        const derivedItems = getDerivedItems(ownerEmail).map((item) => {
          const storedItem = storedMap[item.id];
          if (!storedItem) return item;
          if (storedItem.status !== "open") {
            const storedSeenAt = storedItem.lastSeenAt ? new Date(storedItem.lastSeenAt).getTime() : 0;
            const itemSeenAt = item.createdAt ? new Date(item.createdAt).getTime() : 0;
            if (itemSeenAt <= storedSeenAt) return null;
          }
          return normalizeRecoveryItem({
            ...item,
            createdAt: storedItem.status === "open" ? (storedItem.createdAt || item.createdAt) : item.createdAt,
            lastSeenAt: item.lastSeenAt
          }, {
            ownerEmail,
            sourceMode: item.sourceMode
          });
        }).filter(Boolean);

        const explicitItems = storedItems.filter(item => !item.id.startsWith("derived:") && item.status === "open");
        return normalizeRecoveryItems([...explicitItems, ...derivedItems], {
          ownerEmail
        });
      }

      function getRecoveryActionFromItems(items, itemId = "") {
        const nextItem = itemId
          ? items.find(item => item.id === itemId && item.status === "open") || null
          : items.find(item => item.status === "open") || null;
        if (!nextItem) return null;
        return {
          itemId: nextItem.id,
          label: nextItem.recommendedAction || "Open",
          destination: {
            page: nextItem.targetRoute || "Account",
            sectionId: nextItem.targetSection || "",
            actionKey: nextItem.targetAction || "",
            actionContext: nextItem.actionContext || {}
          }
        };
      }

      function setRecoveryStatus(id, status, options = {}) {
        const ownerEmail = normalizeOwnerEmail(options.ownerEmail || getCurrentOwnerEmail());
        if (!ownerEmail) {
          return createGatewayFailure("Sign in before updating recovery items.", { mode: getGatewayMode() });
        }

        const currentItems = getOpenItems(ownerEmail);
        const storedItems = getStoredItems(ownerEmail);
        const currentItem = currentItems.find(item => item.id === id) || storedItems.find(item => item.id === id) || null;
        if (!currentItem && !options.forceCreate) {
          return createGatewaySuccess({
            mode: "mock",
            data: { item: null },
            message: "Recovery already clear."
          });
        }
        const nextItem = normalizeRecoveryItem({
          ...(currentItem || {}),
          id,
          ownerEmail,
          status,
          lastSeenAt: new Date().toISOString()
        }, {
          ownerEmail,
          status,
          sourceMode: options.sourceMode || (currentItem ? currentItem.sourceMode : "derived")
        });

        upsertStoredItem(ownerEmail, nextItem);
        if (status === "resolved") {
          recoveryGateway.resolveRecoveryItem(id);
        } else if (status === "dismissed") {
          recoveryGateway.dismissRecoveryItem(id);
        }
        void syncRecoveryState({ force: true });

        return createGatewaySuccess({
          mode: nextItem.sourceMode || "mock",
          data: { item: nextItem },
          message: status === "dismissed" ? "Recovery item hidden." : "Recovery item resolved."
        });
      }

      return {
        getRecoveryItems() {
          return getRecoveryState().items;
        },
        getRecoverySummary() {
          const recoveryState = getRecoveryState();
          return {
            openCount: recoveryState.items.length,
            attentionCount: recoveryState.attentionCount,
            nextAction: recoveryState.nextAction,
            highestSeverity: recoveryState.items[0] ? recoveryState.items[0].severity : "info"
          };
        },
        getNextRecoveryAction(itemId = "") {
          const recoveryState = getRecoveryState();
          const items = recoveryState.hasLoaded ? recoveryState.items : getOpenItems(getCurrentOwnerEmail());
          return getRecoveryActionFromItems(items, itemId);
        },
        resetState,
        async ensureRecoveryLoaded({ force = false } = {}) {
          const recoveryState = getRecoveryState();
          const ownerEmail = getCurrentOwnerEmail();

          if (!ownerEmail) {
            if (
              recoveryState.ownerEmail ||
              recoveryState.notice !== "Sign in to view help & recovery." ||
              recoveryState.items.length
            ) {
              resetState("Sign in to view help & recovery.");
            }
            return createGatewaySuccess({
              mode: "mock",
              data: { items: [] },
              message: "Sign in to view help & recovery."
            });
          }

          if (!force && recoveryState.hasLoaded && recoveryState.ownerEmail === ownerEmail) {
            return createGatewaySuccess({
              mode: recoveryState.lastSourceMode,
              data: { items: recoveryState.items },
              message: recoveryState.notice || "Recovery loaded."
            });
          }

          if (loadPromise && !force) return loadPromise;

          applyRecoveryState({
            ownerEmail,
            status: "loading",
            notice: "",
            hasLoaded: false
          });

          loadPromise = (async () => {
            const localItems = getOpenItems(ownerEmail);
            const result = recoveryGateway.getRecoveryItems(localItems);
            if (!result.ok) {
              applyRecoveryState({
                ownerEmail,
                status: "error",
                notice: result.message || "Unable to load help & recovery right now.",
                hasLoaded: false
              });
              return result;
            }

            const normalized = normalizeRecoveryListResponse(result.data, result, ownerEmail);
            applyRecoveryState({
              items: normalized.items,
              ownerEmail,
              status: "ready",
              notice: formatGatewayNotice(result, "Showing local recovery items."),
              lastSourceMode: normalized.sourceMode,
              hasLoaded: true,
              attentionCount: normalized.items.filter(item => item.severity !== "info").length,
              nextAction: getRecoveryActionFromItems(normalized.items)
            });

            return {
              ...result,
              data: normalized
            };
          })().finally(() => {
            loadPromise = null;
          });

          return loadPromise;
        },
        upsertRecoveryItem(itemInput) {
          const ownerEmail = normalizeOwnerEmail(itemInput && itemInput.ownerEmail ? itemInput.ownerEmail : getCurrentOwnerEmail());
          if (!ownerEmail) return null;

          const currentItem = getStoredItems(ownerEmail).find(item => item.id === itemInput.id) || null;
          const nextItem = normalizeRecoveryItem({
            ...(currentItem || {}),
            ...(itemInput || {}),
            ownerEmail,
            status: "open",
            createdAt: currentItem ? currentItem.createdAt : (itemInput && itemInput.createdAt ? itemInput.createdAt : new Date().toISOString()),
            lastSeenAt: new Date().toISOString()
          }, {
            ownerEmail,
            sourceMode: itemInput && itemInput.sourceMode ? itemInput.sourceMode : (currentItem ? currentItem.sourceMode : "mock")
          });

          upsertStoredItem(ownerEmail, nextItem);
          void syncRecoveryState({ force: true });

          return createGatewaySuccess({
            mode: nextItem.sourceMode,
            data: { item: nextItem },
            message: "Recovery item saved."
          });
        },
        resolveRecoveryItem(id, options = {}) {
          return setRecoveryStatus(id, "resolved", options);
        },
        dismissRecoveryItem(id, options = {}) {
          return setRecoveryStatus(id, "dismissed", options);
        }
      };
    }

    function createAccountService() {
      function getCurrentAccount() {
        const session = getCurrentSessionState();
        const user = session.currentUser || null;
        return {
          isAuthenticated: Boolean(session.isAuthenticated && user && user.email),
          currentUser: user,
          displayName: getSessionDisplayName(),
          authMode: session.authMode || getGatewayMode(),
          lastAuthAction: session.lastAuthAction || null,
          updatedAt: session.updatedAt || null,
          sessionStatus: session.isAuthenticated ? "authenticated" : "guest"
        };
      }

      return {
        getCurrentAccount,
        getAccountActivity() {
          const account = getCurrentAccount();
          const sections = account.isAuthenticated
            ? accountGateway.getAccountActivity(account.currentUser.email)
            : createEmptyAccountActivitySections();

          const recentItems = sections
            .flatMap(section => section.items)
            .sort((left, right) => {
              const leftTime = left.createdAt ? new Date(left.createdAt).getTime() : 0;
              const rightTime = right.createdAt ? new Date(right.createdAt).getTime() : 0;
              return rightTime - leftTime;
            });

          return {
            sections,
            totalCount: recentItems.length,
            recentItems
          };
        },
        getFormPrefill(actionKey) {
          const account = getCurrentAccount();
          if (!account.isAuthenticated || !account.currentUser) return {};
          if (actionKey === "create-preset") {
            const requestSettings = appServices.settings.getEffectiveRequestSettings();
            return {
              name: "",
              description: "",
              defaultModel: requestSettings.defaultModel,
              responseMode: requestSettings.responseMode,
              routingPreset: requestSettings.routingPreset
            };
          }
          if (!["api-key", "talk-to-sales", "request-demo", "get-started"].includes(actionKey)) return {};

          return {
            name: account.currentUser.name || "",
            email: account.currentUser.email || "",
            workEmail: account.currentUser.email || ""
          };
        },
        signOut() {
          accountGateway.signOut();
          appServices.apiKeys.resetState();
          appServices.usage.resetState();
          appServices.settings.resetState();
          appServices.presets.resetState();
          appServices.onboarding.resetState();
          appServices.recovery.resetState();
          appServices.conversion.clearIntent();
          const session = clearSessionState();
          return {
            ok: true,
            session
          };
        }
      };
    }

    function createDocsService() {
      let listPromise = null;
      const detailPromises = Object.create(null);

      function applyDocsItems(items, meta = {}) {
        const normalizedItems = normalizeDocCollection(items);
        const nextItems = normalizedItems.length ? normalizedItems : getDefaultDocs();
        const docsState = getAppState("docs");
        const nextSelectedSlug = (findBySlug(nextItems, meta.selectedSlug || docsState.selectedSlug || repositories.preferences.getDocsArticle()) || nextItems[0]).slug;
        const nextDetailMap = createItemMap(
          nextItems.map(item => mergeEntityData(docsState.detailMap[item.slug], item))
        );

        updateAppState("docs", {
          items: nextItems,
          detailMap: nextDetailMap,
          selectedSlug: nextSelectedSlug,
          status: meta.status || "ready",
          notice: meta.notice || "",
          dataMode: meta.mode || docsState.dataMode || "mock"
        });

        return getAppState("docs");
      }

      function applyDocDetail(doc, meta = {}) {
        if (!doc) return null;
        const normalizedDoc = normalizeDocDetail(doc);
        const docsState = getAppState("docs");
        updateAppState("docs", {
          detailMap: {
            ...docsState.detailMap,
            [normalizedDoc.slug]: mergeEntityData(docsState.detailMap[normalizedDoc.slug], normalizedDoc)
          },
          selectedSlug: meta.selectedSlug || docsState.selectedSlug,
          status: meta.status || "ready",
          notice: meta.notice !== undefined ? meta.notice : docsState.notice,
          dataMode: meta.mode || docsState.dataMode || "mock"
        });
        return getAppState("docs").detailMap[normalizedDoc.slug];
      }

      const service = {
        listDocs() {
          return getAppState("docs").items;
        },
        getDocBySlug(slug) {
          const docsState = getAppState("docs");
          return docsState.detailMap[slug] || findBySlug(docsState.items, slug) || null;
        },
        getSelectedArticleSlug() {
          return docsGateway.getSelectedArticleSlug();
        },
        setSelectedArticle(slug) {
          return docsGateway.setSelectedArticleSlug(slug);
        },
        async ensureDocsLoaded({ force = false } = {}) {
          const cachedDocs = force ? null : getCachedResource(STORAGE_KEYS.docsListCache, DIRECTORY_CACHE_TTL.docs);
          if (cachedDocs) {
            applyDocsItems(cachedDocs, { mode: "cache" });
            return createGatewaySuccess({ mode: "cache", data: getAppState("docs").items, message: "Docs loaded from cache." });
          }

          if (!isLiveGatewayEnabled()) {
            applyDocsItems(getDefaultDocs(), { mode: "mock" });
            return createGatewaySuccess({ mode: "mock", data: getAppState("docs").items, message: "Using local docs." });
          }

          if (listPromise && !force) return listPromise;

          updateAppState("docs", {
            status: "loading",
            notice: "Refreshing docs directory..."
          });

          listPromise = (async () => {
            const result = await docsGateway.listDocs();
            if (!result.ok) {
              updateAppState("docs", {
                status: "error",
                notice: result.message || "Unable to refresh docs right now."
              });
              return result;
            }

            const nextItems = normalizeDocCollection(extractDocListPayload(result.data));
            if (!nextItems.length) {
              applyDocsItems(getDefaultDocs(), {
                mode: result.mode,
                notice: formatDirectoryNotice(result, "Showing local docs.")
              });
              return {
                ...result,
                data: getAppState("docs").items
              };
            }

            setCachedResource(STORAGE_KEYS.docsListCache, nextItems);
            applyDocsItems(nextItems, {
              mode: result.mode,
              notice: formatDirectoryNotice(result, "Showing local docs.")
            });

            return {
              ...result,
              data: getAppState("docs").items
            };
          })().finally(() => {
            listPromise = null;
          });

          return listPromise;
        },
        async ensureDocDetail(slug, { force = false } = {}) {
          const nextSlug = (findBySlug(getAppState("docs").items, slug) || findBySlug(getDefaultDocs(), slug)).slug;
          const detailCacheKey = buildResourceCacheKey(STORAGE_KEYS.docsDetailCachePrefix, nextSlug);
          const cachedDoc = force ? null : getCachedResource(detailCacheKey, DIRECTORY_CACHE_TTL.docs);

          if (cachedDoc) {
            return applyDocDetail(cachedDoc, { mode: "cache" });
          }

          if (!isLiveGatewayEnabled()) {
            return applyDocDetail(service.getDocBySlug(nextSlug) || findBySlug(getDefaultDocs(), nextSlug), { mode: "mock" });
          }

          if (detailPromises[nextSlug] && !force) return detailPromises[nextSlug];

          detailPromises[nextSlug] = (async () => {
            const result = await docsGateway.getDocBySlug(nextSlug);
            if (!result.ok) {
              updateAppState("docs", {
                status: "ready",
                notice: result.message || getAppState("docs").notice
              });
              return service.getDocBySlug(nextSlug);
            }

            const normalizedDoc = normalizeDocDetail(extractDocDetailPayload(result.data));
            setCachedResource(detailCacheKey, normalizedDoc);
            return applyDocDetail(normalizedDoc, {
              mode: result.mode,
              notice: formatDirectoryNotice(result, "Showing local docs.")
            });
          })().finally(() => {
            delete detailPromises[nextSlug];
          });

          return detailPromises[nextSlug];
        }
      };

      return service;
    }

            if (!result.ok) {
              updateAppState("models", {
                status: "error",
                notice: result.message || "Unable to refresh models right now."
              });
              return result;

            const nextItems = normalizeModelCollection(extractModelListPayload(result.data));
            if (!nextItems.length) {
              applyModels(getDefaultModels(), {

                notice: formatDirectoryNotice(result, "Showing local catalog.")
              });
              return {

                data: getAppState("models").items
              };

            setCachedResource(STORAGE_KEYS.catalogModelsCache, nextItems);
            applyModels(nextItems, {
              mode: result.mode,
              notice: formatDirectoryNotice(result, "Showing local catalog.")
            });

            return {
              ...result,
              data: getAppState("models").items
            };
          })().finally(() => {
            listPromise = null;
          });

          return listPromise;
        },
        async ensureModelDetail(slug, { force = false } = {}) {
          const nextSlug = (getModelBySlugFromCollection(getAppState("models").items, slug) || getModelBySlugFromCollection(getDefaultModels(), slug)).slug;
          const detailCacheKey = buildResourceCacheKey(STORAGE_KEYS.catalogModelDetailPrefix, nextSlug);
          const cachedModel = force ? null : getCachedResource(detailCacheKey, DIRECTORY_CACHE_TTL.models);

          if (cachedModel) {
            return applyModelDetail(cachedModel, { mode: "cache" });

          if (!isLiveGatewayEnabled()) {
            return applyModelDetail(service.getModelBySlug(nextSlug) || getModelBySlugFromCollection(getDefaultModels(), nextSlug), { mode: "mock" });
          }

          if (detailPromises[nextSlug] && !force) return detailPromises[nextSlug];

              });

    function formatActionFeedback(result, defaultMessage = "Saved successfully.") {
      if (typeof result === "string") return result;
      if (!result || typeof result !== "object") return defaultMessage;
      if (!result.ok) return result.message || "Unable to submit right now. Please try again.";
      if (result.fallbackUsed && result.warning) {
        return `${result.warning} ${result.message || defaultMessage}`;
      }
      return result.message || defaultMessage;
    }

    function showActionFeedback(result, defaultMessage) {
      window.alert(formatActionFeedback(result, defaultMessage));
    }

    function isPublicConversionAction(actionKey) {
      return [
        "sign-in",
        "sign-up",
        "api-key",
        "get-started",
        "talk-to-sales",
        "request-demo"
      ].includes(actionKey);
    }

    function getActionContext(target) {
      return {
        page: getCurrentPage(),
        cta: target.textContent.trim(),
        plan: target.getAttribute("data-plan")
      };
    }

    function createConversionIntentFromTarget(target) {
      if (!target) return null;

      const actionKey = String(target.getAttribute("data-action") || "").trim();
      const routeTarget = String(target.getAttribute("data-go") || "").trim();
      const selectedPlan = String(target.getAttribute("data-plan") || "").trim();
      const sourcePage = normalizeConversionPage(getCurrentPage());

      if (actionKey === "sign-in") {
        return normalizeConversionIntent({
          sourcePage,
          sourceAction: CONVERSION_SOURCE_ACTIONS.signIn,
          selectedPlan
        });
      }
      if (actionKey === "sign-up") {
        return normalizeConversionIntent({
          sourcePage,
          sourceAction: CONVERSION_SOURCE_ACTIONS.signUp,
          selectedPlan
        });
      }
      if (actionKey === "api-key") {
        return normalizeConversionIntent({
          sourcePage,
          sourceAction: CONVERSION_SOURCE_ACTIONS.getApiKey,
          selectedPlan
        });
      }
      if (actionKey === "get-started") {
        return normalizeConversionIntent({
          sourcePage,
          sourceAction: sourcePage === "pricing" ? CONVERSION_SOURCE_ACTIONS.pricingPlan : CONVERSION_SOURCE_ACTIONS.getStarted,
          selectedPlan
        });
      }
      if (actionKey === "talk-to-sales") {
        return normalizeConversionIntent({
          sourcePage,
          sourceAction: CONVERSION_SOURCE_ACTIONS.talkToSales,
          selectedPlan
        });
      }
      if (actionKey === "request-demo") {
        return normalizeConversionIntent({
          sourcePage,
          sourceAction: CONVERSION_SOURCE_ACTIONS.requestDemo,
          selectedPlan
        });
      }
      if (routeTarget === "Models" && sourcePage === "home") {
        return normalizeConversionIntent({
          sourcePage,
          sourceAction: CONVERSION_SOURCE_ACTIONS.exploreModels,
          selectedPlan
        });
      }

      return null;
    }

    function shouldOpenAuthForGuest(intent) {
      if (!intent) return false;
      return [
        CONVERSION_SOURCE_ACTIONS.getApiKey,
        CONVERSION_SOURCE_ACTIONS.getStarted,
        CONVERSION_SOURCE_ACTIONS.pricingPlan
      ].includes(intent.sourceAction);
    }

    function followResolvedDestination(destination) {
      const nextDestination = destination || appServices.conversion.getPostAuthDestination();
      const nextPage = nextDestination.page || "Account";

      if (nextDestination.sectionId) scheduleAccountSectionFocus(nextDestination.sectionId);
      if (nextDestination.actionKey) scheduleRouteAction(nextPage, nextDestination.actionKey, nextDestination.actionContext || {});

      goToPage(nextPage);
    }

    function handlePublicConversionTarget(target) {
      const intent = createConversionIntentFromTarget(target);
      if (!intent) return false;

      const account = appServices.account.getCurrentAccount();
      const actionKey = String(target.getAttribute("data-action") || "").trim();

      if (!account.isAuthenticated) {
        appServices.conversion.recordIntent(intent);

        if (actionKey === "sign-in" || actionKey === "sign-up") {
          openActionPanel(actionKey, getActionContext(target));
          return true;
        }

        if (shouldOpenAuthForGuest(intent)) {
          openActionPanel("sign-up", getActionContext(target));
          return true;
        }

        return false;
      }

      const consumed = appServices.conversion.consumeIntent({
        ...intent,
        ownerEmail: getSessionUserEmail()
      }, getSessionUserEmail());
      followResolvedDestination(consumed.destination);
      return true;
    }

    function renderActionField(field, initialValues = {}) {
      const required = field.required ? "required" : "";
      const autoComplete = field.autocomplete ? `autocomplete="${field.autocomplete}"` : "";
      const minLength = field.minLength ? `minlength="${field.minLength}"` : "";
      const placeholder = field.placeholder ? `placeholder="${field.placeholder}"` : "";
      const fieldValue = initialValues[field.name] !== undefined ? String(initialValues[field.name]) : "";
      const escapedValue = escapeHtml(fieldValue);
      const valueAttr = fieldValue ? `value="${escapedValue}"` : "";
      const listId = field.listOptions ? `action-field-${field.name}-options` : "";
      const listAttr = listId ? `list="${listId}"` : "";
      const listMarkup = listId ? `
          <datalist id="${listId}">
            ${field.listOptions.map(option => `<option value="${option}"></option>`).join("")}
          </datalist>
          <div class="small muted" style="line-height:1.8">${field.listOptions.join(" · ")}</div>
        ` : "";

      if (field.element === "textarea") {
        return `
          <label style="display:grid;gap:8px">
            <span class="small muted">${field.label}</span>
            <div class="chat-input" style="align-items:flex-start">
              <textarea name="${field.name}" ${required} ${autoComplete} ${placeholder} rows="4" style="width:100%;min-height:96px;border:0;outline:0;background:transparent;font:inherit;resize:vertical">${escapedValue}</textarea>
            </div>
          </label>
        `;
      }

      return `
        <label style="display:grid;gap:8px">
          <span class="small muted">${field.label}</span>
          <div class="chat-input">
            <input name="${field.name}" type="${field.type || "text"}" ${required} ${autoComplete} ${minLength} ${placeholder} ${valueAttr} ${listAttr} />
          </div>
          ${listMarkup}
        </label>
      `;
    }

    function renderRequestSettingsField(name, label, value, options) {
      const listId = `request-settings-${name}-options`;
      return `
        <label style="display:grid;gap:8px">
          <span class="small muted">${label}</span>
          <div class="chat-input">
            <input name="${name}" list="${listId}" value="${escapeHtml(value)}" autocomplete="off" />
          </div>
          <datalist id="${listId}">
            ${options.map(option => `<option value="${option}"></option>`).join("")}
          </datalist>
          <div class="small muted" style="line-height:1.8">${options.join(" · ")}</div>
        </label>
      `;
    }

    function closeActionPanel() {
      updateAppState("route", { activeAction: null });
      ctaPanel.innerHTML = "";
      ctaPanelShell.classList.add("hidden");
    }

    function openActionPanel(actionKey, context = {}) {
      const schema = ACTION_FORM_SCHEMAS[actionKey];
      if (!schema) return;
      const prefillValues = appServices.account.getFormPrefill(actionKey);

      const description = actionKey === "get-started" && context.plan
        ? `${schema.description} Selected plan: ${context.plan}.`
        : schema.description;

      updateAppState("route", { activeAction: { actionKey, context } });
      ctaPanel.innerHTML = `
        <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start">
          <div>
            <div class="title" id="cta-panel-title">${schema.title}</div>
            <div class="small muted" style="margin-top:8px;line-height:1.8">${description}</div>
          </div>
          <button type="button" class="btn btn-light" data-panel-close style="padding:10px 16px">Close</button>
        </div>
        <form id="cta-form" data-action-key="${actionKey}" novalidate style="display:grid;gap:16px;margin-top:24px">
          ${schema.fields.map(field => renderActionField(field, prefillValues)).join("")}
          <div style="display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap">
            <button type="button" class="btn btn-light" data-panel-close>Cancel</button>
            <button type="submit" class="btn btn-dark">${schema.submitLabel}</button>
          </div>
        </form>
      `;
      ctaPanelShell.classList.remove("hidden");

      const firstField = ctaPanel.querySelector("input, textarea");
      if (firstField) firstField.focus();

    function collectFormValues(form, fields) {
      const formData = new FormData(form);
      return fields.reduce((values, field) => {
        const rawValue = formData.get(field.name);
        values[field.name] = field.type === "password" ? String(rawValue || "") : String(rawValue || "").trim();
        return values;
      }, {});
    }

    function collectRequestSettingsValues(form) {
      const formData = new FormData(form);
      return {
        defaultModel: String(formData.get("defaultModel") || "").trim(),
        responseMode: String(formData.get("responseMode") || "").trim(),
        routingPreset: String(formData.get("routingPreset") || "").trim()
      };
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function findBySlug(items, slug) {
      if (!Array.isArray(items) || !items.length) return null;
      return items.find(item => item.slug === slug) || items[0];
    }

    function getModelBySlugFromCollection(items, slug) {
      if (!Array.isArray(items) || !items.length) return null;
      return items.find(item => item.slug === slug) || null;
    }

    function createInitialChatMessages() {
      return INITIAL_CHAT_MESSAGES.map(message => ({ ...message }));
    }

    function getActiveDocArticle() {
      return appServices.docs.getDocBySlug(getAppState("docs").selectedSlug);
    }

    function selectDocArticle(slug) {
      const nextSlug = (findBySlug(appServices.docs.listDocs(), slug) || findBySlug(getDefaultDocs(), slug)).slug;
      if (FEATURE_FLAGS.persistDocsSelection) appServices.docs.setSelectedArticle(nextSlug);
      updateAppState("docs", { selectedSlug: nextSlug });
      if (getCurrentPage() === "Docs") renderDocsPageState();
      void syncSelectedDocDetail(nextSlug);
    }

      const el = document.getElementById(elementId);
      if (!el) return;

      const directoryState = getAppState(stateKey);
      const statusText = directoryState.notice || "";
      el.textContent = statusText;
      el.style.display = statusText ? "block" : "none";
    }

    function renderRequestSettingsSummary(elementId) {
      const el = document.getElementById(elementId);
      if (!el) return;

      const summary = appServices.presets.getCurrentProfileSummary();
      const updatedSuffix = summary.updatedAt ? ` · updated ${formatSessionTimestamp(summary.updatedAt)}` : "";

    function renderQuickstartSummaryPrompt() {
      const account = appServices.account.getCurrentAccount();
      const onboardingState = getAppState("onboarding");
      if (!account.isAuthenticated || onboardingState.dismissed || !onboardingState.hasLoaded) return "";

        <div class="small muted" style="margin-top:16px;line-height:1.8">

        </div>

    function focusAccountSection(sectionId) {
      const target = sectionId ? document.getElementById(sectionId) : null;
      if (!target || typeof target.scrollIntoView !== "function") return;
      target.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    let pendingAccountSectionFocus = "";
    let pendingRouteAction = null;

    function scheduleAccountSectionFocus(sectionId) {
      pendingAccountSectionFocus = sectionId || "";
    }

    function flushPendingAccountSectionFocus() {
      if (getCurrentPage() !== "Account" || !pendingAccountSectionFocus) return;
      const sectionId = pendingAccountSectionFocus;
      pendingAccountSectionFocus = "";
      requestAnimationFrame(() => focusAccountSection(sectionId));
    }

    function scheduleRouteAction(page, actionKey, context = {}) {
      if (!page || !actionKey) return;
      pendingRouteAction = {
        page,
        actionKey,
        context
      };
    }

    function flushPendingRouteAction() {
      if (!pendingRouteAction || pendingRouteAction.page !== getCurrentPage()) return;
      const nextAction = pendingRouteAction;
      pendingRouteAction = null;
      openActionPanel(nextAction.actionKey, nextAction.context);
    }

    function renderDocsState() {
      const browseList = document.getElementById("docs-browse-list");
      const detailGrid = document.getElementById("docs-detail-grid");
      if (!browseList || !detailGrid) return;

      const article = getActiveDocArticle();
      renderDirectoryStatus("docs-status", "docs");
      if (!article) {
        browseList.innerHTML = "";
        detailGrid.innerHTML = "";
        return;
      }
      browseList.innerHTML = appServices.docs.listDocs().map(doc => `
        <button class="list-item ${doc.slug === article.slug ? "active" : ""}" data-doc-slug="${doc.slug}">
          <span>${doc.title}</span>
          <span>›</span>
        </button>
      `).join("");
      detailGrid.innerHTML = `
        <div class="card panel">
          <span class="chip">${article.tag}</span>
          <div class="title" style="margin-top:16px">${article.title}</div>
          <p class="small muted" style="line-height:1.8;margin-top:8px">${article.desc}</p>
        </div>
        <div class="card panel">
          <div class="small" style="font-weight:600;color:#09090b">Overview</div>
          <p class="small muted" style="line-height:1.8;margin-top:16px">${article.body}</p>
        </div>
        <div class="dark-panel" style="padding:24px">
          <div class="small" style="color:#d4d4d8">Example</div>
          <div class="code-shell" style="margin-top:16px">
            <div class="code-head">${article.title} example</div>
            <pre>${escapeHtml(article.code)}</pre>
          </div>

    async function syncDocsDirectoryState(options = {}) {
      const result = await appServices.docs.ensureDocsLoaded(options);
      if (getCurrentPage() === "Docs") renderDocsState();
      return result;
    }

    async function syncSelectedDocDetail(slug, options = {}) {
      if (!slug) return null;
      const result = await appServices.docs.ensureDocDetail(slug, options);
      if (getCurrentPage() === "Docs") renderDocsState();
      return result;
    }

    function renderDocsPageState() {
      renderDocsState();
      void syncDocsDirectoryState();
      void syncSelectedDocDetail(getAppState("docs").selectedSlug);
      void appServices.onboarding.markOnboardingStep("review-catalog", {
        completedAt: new Date().toISOString(),
        sourceMode: "derived"
      });
    }

    function generateChatReply(message) {
      const lower = message.toLowerCase();
      const matchedRule = CHAT_REPLY_RULES.find(rule => rule.keywords.some(keyword => lower.includes(keyword)));
      return matchedRule
        ? matchedRule.reply
        : "That prompt fits the unified routing workflow. Start with one balanced model, add a lower-cost fallback, and compare latency before locking in production defaults.";
    }

    function appendChatMessage(role, text, meta = {}) {
      const chatState = getAppState("chat");
      updateAppState("chat", {
        messages: [...chatState.messages, { role, text, sourceMode: meta.sourceMode || null, messageMeta: meta.messageMeta || null }]
      });
    }

    function getChatInsights() {
      const messages = getAppState("chat").messages;
      const userMessages = messages.filter(message => message.role === "user");
      const lastUserMessage = [...userMessages].reverse()[0] || { text: "" };
      const fallbackCount = messages.filter(message => message.role === "assistant" && message.sourceMode === "fallback").length;
      return [
        ["Message count", String(messages.length)],
        ["Estimated requests", String(userMessages.length)],
        ["Last input length", `${lastUserMessage.text.length} chars`],
        ["Fallback count", String(fallbackCount)]
      ];
    }

    function renderChatState() {
      const messageList = document.getElementById("chat-messages");
      const insights = document.getElementById("chat-insights");
      const sendButton = document.getElementById("chat-send-button");
      const input = document.getElementById("chat-input");
      if (!messageList || !insights) return;

      const chatState = getAppState("chat");

      messageList.innerHTML = chatState.messages.map(message => `
        <div class="chat-bubble ${message.role === "user" ? "chat-user" : "chat-assistant"}">${escapeHtml(message.text)}</div>
      `).join("");
      insights.innerHTML = getChatInsights().map(([label, value]) => `
        <div class="mini-card">
          <div class="small muted">${label}</div>
          <div class="kpi" style="margin-top:4px">${escapeHtml(value)}</div>
        </div>
      `).join("");
      renderRequestSettingsSummary("chat-settings-summary");
      renderDirectoryStatus("chat-status", "chat");

      if (sendButton) {
        sendButton.setAttribute("aria-disabled", chatState.isSubmitting ? "true" : "false");
        sendButton.setAttribute("aria-busy", chatState.isSubmitting ? "true" : "false");
      }
      if (input) {
        input.setAttribute("aria-busy", chatState.isSubmitting ? "true" : "false");
      }
    }

    function createChatRequestPayload(message) {
      const chatState = getAppState("chat");
      const requestProfile = appServices.presets.getEffectiveRequestProfile();
      return {
        message,
        history: [...chatState.messages, { role: "user", text: message }].slice(-8).map(item => ({
          role: item.role,
          content: item.text
        })),
        pageContext: getCurrentPage(),
        currentPreset: requestProfile.profileSource === "preset" ? requestProfile.presetName : chatState.currentPreset,
        activePresetId: requestProfile.presetId,
        activePresetName: requestProfile.presetName,
        requestProfileSource: requestProfile.profileSource,
        defaultModel: requestProfile.defaultModel,
        responseMode: requestProfile.responseMode,
        routingPreset: requestProfile.routingPreset,
        selectedModel: requestProfile.defaultModel === "auto" ? "" : requestProfile.defaultModel
      };
    }

    async function submitChatMessage(rawMessage) {
      const message = String(rawMessage || "").trim();
      const chatState = getAppState("chat");
      if (!message || chatState.isSubmitting) return false;

      await Promise.all([
        appServices.settings.ensureRequestSettingsLoaded(),
        appServices.presets.ensurePresetsLoaded()
      ]);
      const payload = createChatRequestPayload(message);
      appendChatMessage("user", message);
      updateAppState("chat", {
        isSubmitting: true,
        notice: "Generating response..."
      });
      if (getCurrentPage() === "Chat") renderChatState();

      const result = await appServices.chat.respond(payload);
      if (!result.ok) {
        appServices.usage.recordAccountLog({
          type: "chat",
          label: "Chat response failed",
          summary: result.message || message,
          ok: false,
          sourceMode: result.mode || getGatewayMode(),
          estimatedInputTokens: estimateTextTokens(message),
          estimatedOutputTokens: 0
        });
        updateAppState("chat", {
          isSubmitting: false,
          notice: result.message || "Unable to respond right now.",
          lastSourceMode: result.mode || getAppState("chat").lastSourceMode
        });
        appServices.recovery.upsertRecoveryItem({
          id: "chat:respond",
          ownerEmail: getSessionUserEmail(),
          type: "chat",
          title: "Chat needs another try",
          description: result.message || "RouteLayer could not finish the latest chat request.",
          sourceMode: getResultSourceMode(result, getGatewayMode()),
          recommendedAction: "Return to Chat",
          targetRoute: "Chat",
          targetSection: "",
          severity: !result.fallbackUsed ? "error" : "warning"
        });
        if (getCurrentPage() === "Chat") renderChatState();
        return false;
      }

      appendChatMessage("assistant", result.data.replyText, {
        sourceMode: result.data.sourceMode,
        messageMeta: result.data.messageMeta
      });
      updateAppState("chat", {
        isSubmitting: false,
        lastSourceMode: result.data.sourceMode,
        notice: formatGatewayNotice(result, "Using local chat reply.")
      });
      appServices.usage.recordAccountLog({
        type: "chat",
        label: `Chat response · ${message.slice(0, 48)}`,
        summary: result.data.replyText.slice(0, 96),
        sourceMode: result.data.sourceMode,
        estimatedInputTokens: estimateTextTokens(message),
        estimatedOutputTokens: estimateTextTokens(result.data.replyText)
      });
      if (result.data.sourceMode === "fallback") {
        appServices.recovery.upsertRecoveryItem({
          id: "chat:respond",
          ownerEmail: getSessionUserEmail(),
          type: "chat",
          title: "Chat used a fallback reply",
          description: formatGatewayNotice(result, "The assistant answered locally after the live endpoint failed.") || "The latest chat reply used a local fallback.",
          sourceMode: result.data.sourceMode,
          recommendedAction: "Return to Chat",
          targetRoute: "Chat",
          targetSection: "",
          severity: "warning"
        });
      } else {
        appServices.recovery.resolveRecoveryItem("chat:respond", { ownerEmail: getSessionUserEmail() });
      }
      if (getCurrentPage() === "Chat") renderChatState();
      return true;
    }

    function isFusionModelSelected(slug) {
      return getAppState("fusion").selectedModels.includes(slug);
    }

    function toggleFusionModelSelection(slug) {
      const fusionState = getAppState("fusion");
      if (fusionState.isSubmitting) return;
      const selectedModels = isFusionModelSelected(slug)
        ? fusionState.selectedModels.filter(modelSlug => modelSlug !== slug)
        : [...fusionState.selectedModels, slug];
      updateAppState("fusion", { selectedModels });
      if (getCurrentPage() === "Fusion") renderFusionState();
    }

    function generateFusionResult(modelSlugs) {
      const sorted = [...modelSlugs].sort().join("|");
      if (!sorted) return "Choose at least one model, then run fusion to compose a combined answer.";
      if (sorted === ["claude-4-5-sonnet", "gemini-2-5-pro", "gpt-4-1-turbo"].sort().join("|")) {
        return "Use Claude as the final composer, Gemini as the fast validator, and GPT as the structure checker. This balances polish, speed, and consistency.";
      }
      if (sorted === ["claude-4-5-sonnet", "gpt-4-1-turbo"].sort().join("|")) {
        return "Claude and GPT together produce polished final drafts with stronger structure, making this pairing a solid fit for support answers and coding-heavy workflows.";
      }
      if (sorted === ["claude-4-5-sonnet", "gemini-2-5-pro"].sort().join("|")) {
        return "Claude plus Gemini gives you broad context coverage with a strong final writer, which works well for research synthesis and product strategy notes.";
      }
      if (sorted === ["gemini-2-5-pro", "gpt-4-1-turbo"].sort().join("|")) {
        return "Gemini and GPT form a practical speed-plus-structure pair when you want fast analysis backed by reliable implementation framing.";
      }
      const [singleModel] = modelSlugs;
      const model = findBySlug(FUSION_MODELS, singleModel);
      return `${model.name} is currently the only selected model, so RouteLayer would return its response directly instead of composing a multi-model fusion.`;
    }

    function createFusionRequestPayload() {
      const fusionState = getAppState("fusion");
      const requestProfile = appServices.presets.getEffectiveRequestProfile();
      return {
        selectedModels: fusionState.selectedModels,
        task: fusionState.task,
        activePresetId: requestProfile.presetId,
        activePresetName: requestProfile.presetName,
        requestProfileSource: requestProfile.profileSource,
        defaultModel: requestProfile.defaultModel,
        responseMode: requestProfile.responseMode,
        routingPreset: requestProfile.routingPreset,
        compareContext: {
          page: getCurrentPage(),
          selectionCount: fusionState.selectedModels.length,
          routingPreset: requestProfile.routingPreset
        }
      };
    }

    async function runFusionSelection() {
      const fusionState = getAppState("fusion");
      if (fusionState.isSubmitting) return null;

      await Promise.all([
        appServices.settings.ensureRequestSettingsLoaded(),
        appServices.presets.ensurePresetsLoaded()
      ]);
      updateAppState("fusion", {
        isSubmitting: true,
        notice: "Running fusion..."
      });
      if (getCurrentPage() === "Fusion") renderFusionState();

      const result = await appServices.fusion.run(createFusionRequestPayload());
      if (!result.ok) {
        appServices.usage.recordAccountLog({
          type: "fusion",
          label: "Fusion run failed",
          summary: result.message || "Unable to run fusion right now.",
          ok: false,
          sourceMode: result.mode || getGatewayMode(),
          estimatedInputTokens: estimateTextTokens(fusionState.task),
          estimatedOutputTokens: 0
        });
        updateAppState("fusion", {
          isSubmitting: false,
          notice: result.message || "Unable to run fusion right now.",
          lastSourceMode: result.mode || getAppState("fusion").lastSourceMode
        });
        appServices.recovery.upsertRecoveryItem({
          id: "fusion:run",
          ownerEmail: getSessionUserEmail(),
          type: "fusion",
          title: "Fusion needs another try",
          description: result.message || "RouteLayer could not finish the latest fusion run.",
          sourceMode: getResultSourceMode(result, getGatewayMode()),
          recommendedAction: "Return to Fusion",
          targetRoute: "Fusion",
          targetSection: "",
          severity: !result.fallbackUsed ? "error" : "warning"
        });
        if (getCurrentPage() === "Fusion") renderFusionState();
        return result;
      }

      updateAppState("fusion", {
        result: result.data.resultText,
        isSubmitting: false,
        lastSourceMode: result.data.sourceMode,
        notice: formatGatewayNotice(result, "Using local fusion result.")
      });
      appServices.usage.recordAccountLog({
        type: "fusion",
        label: `Fusion run · ${fusionState.selectedModels.length} model${fusionState.selectedModels.length === 1 ? "" : "s"}`,
        summary: result.data.resultText.slice(0, 96),
        sourceMode: result.data.sourceMode,
        estimatedInputTokens: estimateTextTokens(fusionState.task) + fusionState.selectedModels.length * 4,
        estimatedOutputTokens: estimateTextTokens(result.data.resultText)
      });
      if (result.data.sourceMode === "fallback") {
        appServices.recovery.upsertRecoveryItem({
          id: "fusion:run",
          ownerEmail: getSessionUserEmail(),
          type: "fusion",
          title: "Fusion used a fallback result",
          description: formatGatewayNotice(result, "The latest fusion result was generated locally after the live endpoint failed.") || "The latest fusion result used a local fallback.",
          sourceMode: result.data.sourceMode,
          recommendedAction: "Return to Fusion",
          targetRoute: "Fusion",
          targetSection: "",
          severity: "warning"
        });
      } else {
        appServices.recovery.resolveRecoveryItem("fusion:run", { ownerEmail: getSessionUserEmail() });
      }
      if (getCurrentPage() === "Fusion") renderFusionState();
      return result;
    }

    function renderFusionState() {
      const modelGrid = document.getElementById("fusion-model-grid");
      const resultBody = document.getElementById("fusion-result-body");
      if (!modelGrid || !resultBody) return;
      const fusionState = getAppState("fusion");

      modelGrid.innerHTML = FUSION_MODELS.map(model => {
        const selected = isFusionModelSelected(model.slug);
        return `
          <button class="card panel" type="button" data-fusion-model="${model.slug}" aria-pressed="${selected}" aria-disabled="${fusionState.isSubmitting ? "true" : "false"}" style="text-align:left;width:100%">
            <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start">
              <div class="title">${model.name}</div>
              <span class="chip">${selected ? "Selected" : "Model"}</span>
            </div>
            <p class="small muted" style="line-height:1.8;margin-top:16px">${model.desc}</p>
            <div class="small muted" style="margin-top:16px">${selected ? "Included in the next fusion run." : "Click to include in the next fusion run."}</div>
          </button>
        `;
      }).join("");
      resultBody.textContent = fusionState.result;
      renderRequestSettingsSummary("fusion-settings-summary");
      renderDirectoryStatus("fusion-status", "fusion");
      const runButton = document.getElementById("fusion-run-button");
      if (runButton) {
        runButton.setAttribute("aria-disabled", fusionState.isSubmitting ? "true" : "false");
        runButton.setAttribute("aria-busy", fusionState.isSubmitting ? "true" : "false");
      }

    function renderHomePageState() {
      renderFeaturedModelsGrid();
      void syncCatalogDirectoryState();
      void syncOnboardingState();
    }

    async function syncAccountApiKeysState(options = {}) {
      const previousState = getAppState("apiKeys");
      const result = await appServices.apiKeys.ensureApiKeysLoaded(options);
      if (getCurrentPage() === "Account" && getAppState("apiKeys") !== previousState) renderApp();
      return result;
    }

    async function syncAccountUsageState(options = {}) {
      const previousState = getAppState("usage");
      const result = await appServices.usage.ensureUsageLoaded(options);
      if (getCurrentPage() === "Account" && getAppState("usage") !== previousState) renderApp();
      return result;
    }

    async function syncRequestProfileState(options = {}) {
      const previousSettingsState = getAppState("settings");
      const previousPresetState = getAppState("presets");
      const result = await Promise.all([
        appServices.settings.ensureRequestSettingsLoaded(options),
        appServices.presets.ensurePresetsLoaded(options)
      ]);
      if (getAppState("settings") !== previousSettingsState || getAppState("presets") !== previousPresetState) {
        if (getCurrentPage() === "Account") renderApp();
        if (getCurrentPage() === "Chat") renderChatState();
        if (getCurrentPage() === "Fusion") renderFusionState();
      }
      return result;
    }

    async function syncOnboardingState(options = {}) {
      const previousState = getAppState("onboarding");
      const result = await appServices.onboarding.ensureOnboardingLoaded(options);
      if (getAppState("onboarding") !== previousState) {
        if (getCurrentPage() === "Account" || getCurrentPage() === "Home") renderApp();
      }
      return result;
    }

    async function syncRecoveryState(options = {}) {
      const previousState = getAppState("recovery");
      const result = await appServices.recovery.ensureRecoveryLoaded(options);
      if (getAppState("recovery") !== previousState) {
        if (getCurrentPage() === "Account") {
          renderApp();
        } else {
          renderNav();
        }
      }
      return result;
    }

    function renderAccountPageState() {
      void syncAccountApiKeysState();
      void syncAccountUsageState();
      void syncRequestProfileState();
      void syncOnboardingState();
      flushPendingAccountSectionFocus();
    }

    function renderChatPageState() {
      renderChatState();
      void syncRequestProfileState();
    }

    function renderFusionPageState() {
      renderFusionState();
      void syncRequestProfileState();
    }

              <div class="small" style="font-weight:600;color:#09090b">Quickstart hidden</div>

        <div id="account-quickstart-section" style="margin-top:24px">
          ${sectionTitle("Get started", "Quickstart", "Finish a few real setup actions, then keep building with the same account defaults and developer surface.", null)}
          <div class="pill-row">
            ${chip(progress.label)}
            ${chip(sourceMode)}
            ${chip(progressStatus)}
          </div>
          ${onboardingState.notice ? `<div class="small muted" style="margin-top:12px;line-height:1.8">${onboardingState.notice}</div>` : ""}

                ${nextStep ? btn("Continue", true, 'data-onboarding-continue="true"') : ""}

      return "Continue setup";

    function createAppActions() {
      return {
        navigate: goToPage,
        openActionPanel,
        closeActionPanel,
        submitCtaForm,
        selectDocArticle,
        submitChatMessage,
        toggleFusionModelSelection,
        runFusionSelection,
        selectModel,
        signOut: () => appServices.account.signOut(),
        revokeApiKey: (id) => appServices.apiKeys.revokeApiKey(id),
        copyApiKeyValue: (id) => appServices.apiKeys.copyApiKeyValue(id),
        clearCreatedApiKey: () => appServices.apiKeys.clearCreatedApiKey(),
        saveRequestSettings: (values) => appServices.settings.saveRequestSettings(values),
        resetRequestSettings: () => appServices.settings.resetRequestSettings(),
        activatePreset: (id) => appServices.presets.activatePreset(id),
        deletePreset: (id) => appServices.presets.deletePreset(id),
        openRecoveryCenter: () => {
          if (getCurrentPage() === "Account") {
            focusAccountSection("account-recovery-section");
            return;
          }
          scheduleAccountSectionFocus("account-recovery-section");
          goToPage("Account");
        },
        continueRecovery: (id = "") => {
          const nextAction = appServices.recovery.getNextRecoveryAction(id);
          if (!nextAction) {
            if (getCurrentPage() === "Account") {
              focusAccountSection("account-recovery-section");
            } else {
              scheduleAccountSectionFocus("account-recovery-section");
              goToPage("Account");
            }
            return null;
          }
          followResolvedDestination(nextAction.destination);
          return nextAction;
        },
        dismissRecovery: (id) => appServices.recovery.dismissRecoveryItem(id),
        continueConversion: () => {
          const summary = appServices.conversion.getAccountSummary();
          if (!summary) return null;
          followResolvedDestination(summary.destination);
          return summary;
        },
        dismissConversion: () => appServices.conversion.dismissSummary(),
        continueOnboarding: async (stepId = "") => {
          await appServices.onboarding.ensureOnboardingLoaded();
          const onboarding = appServices.onboarding.getOnboardingProgress();
          const targetStep = stepId
            ? onboarding.steps.find(step => step.id === stepId) || null
            : onboarding.nextStep;

          if (!targetStep) {
            if (getCurrentPage() === "Account") {
              focusAccountSection("account-quickstart-section");
            } else {
              scheduleAccountSectionFocus("account-quickstart-section");
              goToPage("Account");
            }
            return null;
          }

          if (targetStep.linkedRoute === "Account") {
            const sectionId = targetStep.accountSection || "account-quickstart-section";
            if (getCurrentPage() === "Account") {
              focusAccountSection(sectionId);
            } else {
              scheduleAccountSectionFocus(sectionId);
              goToPage("Account");
            }
            return targetStep;
          }

          goToPage(targetStep.linkedRoute);
          return targetStep;
        },
        setOnboardingDismissed: (dismissed = true) => appServices.onboarding.setDismissed(dismissed)
      };
    }

    function fusionPage() {
